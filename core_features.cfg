######################################################################
# KAT – Klipper Automation Toolkit
#
# Main core entrypoint for KAT.
#
# Add this single line to printer.cfg:
# [include KAT/core_features.cfg]
#
# This file loads the core KAT macro suite in the required order.
# Hardware-specific configuration should stay in printer.cfg.
######################################################################

[include klipper_features.cfg]          # Common Klipper baseline modules used by KAT

[include variables.cfg]                 # Shared KAT variables; must load before macros that read [gcode_macro KAT]
[include about.cfg]                     # KAT_ABOUT and startup banner

[include temperature_control.cfg]       # Smart M109/M140/M190 handling
[include kat_helpers.cfg]               # Shared movement, homing, park, and safety helpers
[include motor_tests.cfg]               # Capability-aware diagnostic motor tests
[include fan_control.cfg]               # Filter and exhaust helpers
[include prime.cfg]                     # Line/blob prime helpers

[include start_print.cfg]               # START_PRINT and start-print helper flow
[include end_print.cfg]                 # END_PRINT flow
[include pause_resume.cfg]              # PAUSE, RESUME, CANCEL_PRINT and filament events
