######################################################################
# END_PRINT
#
# Generic KAT end print macro.
#
# Main behavior:
# - Turns off heaters
# - Performs a small retract if possible
# - Moves Z to a safe end print height using MOVE_END_PRINT_Z
# - Parks the toolhead using PARK_TOOLHEAD
# - Turns off part cooling, exhaust, and filter helpers if present
# - Restores standby idle timeout
######################################################################
[gcode_macro END_PRINT]
description: Generic KAT END_PRINT
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set current_temp = printer.extruder.temperature|float %}
    {% set can_extrude = printer.extruder.can_extrude %}
    {% set material = kat.current_material|string|upper %}

    ##################################################################
    # End print start
    ##################################################################
    RESPOND PREFIX="PRINT" MSG="END_PRINT begin"
    RESPOND PREFIX="PRINT" MSG="Finishing print for material {material}"

    # Make sure all queued moves are finished before shutdown moves.
    M400

    # Use relative extrusion for the final retract.
    M83

    ##################################################################
    # Final retract
    ##################################################################

    # Retract only if the hotend is allowed to extrude.
    {% if kat.end_print_retract|float > 0 and can_extrude %}
        RESPOND PREFIX="PRINT" MSG="Retracting filament by {kat.end_print_retract}mm"
        G1 E-{kat.end_print_retract|float} F{kat.end_print_retract_feed|float}
    {% else %}
        RESPOND PREFIX="PRINT" MSG="Final retract skipped"
    {% endif %}

    ##################################################################
    # Turn off heaters
    ##################################################################

    # Turn off hotend.
    M104 S0

    # Turn off the bed when configured; otherwise report the external-bed state.
    KAT_SET_BED_TEMPERATURE S=0

    ##################################################################
    # Safe Z move and park
    ##################################################################

    # Move Z to a safe END_PRINT height if the helper exists.
    {% if 'gcode_macro MOVE_END_PRINT_Z' in printer %}
        MOVE_END_PRINT_Z
    {% else %}
        RESPOND PREFIX="Z" MSG="MOVE_END_PRINT_Z not found, skipping safe Z move"
    {% endif %}

    # Park the toolhead if the helper exists.
    {% if 'gcode_macro PARK_TOOLHEAD' in printer %}
        PARK_TOOLHEAD POSITION={kat.end_print_park_position}
    {% else %}
        RESPOND PREFIX="PARK" MSG="PARK_TOOLHEAD not found, skipping park move"
    {% endif %}

    ##################################################################
    # Fans and air handling
    ##################################################################

    # Turn off part cooling fan.
    M107

    # Turn off exhaust fan if helper exists.
    {% if 'gcode_macro EXHAUST_OFF' in printer %}
        EXHAUST_OFF
    {% endif %}

    # Turn off filter fan if helper exists.
    {% if 'gcode_macro FILTER_OFF' in printer %}
        FILTER_OFF
    {% endif %}

    ##################################################################
    # Reset print state
    ##################################################################

    # Restore standby idle timeout.
    SET_IDLE_TIMEOUT TIMEOUT={kat.idle_timeout_standby}

    # Clear pause state.
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0

    RESPOND PREFIX="PRINT" MSG="Print complete"
