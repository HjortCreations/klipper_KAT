######################################################################
# KAT MOTOR TESTS
#
# Capability-aware wrappers around Klipper's STEPPER_BUZZ command.
# Motion steppers are discovered from the active printer configuration,
# so no machine-specific motor list is required.
#
# Important:
# - STEPPER_BUZZ moves one motor approximately 1 mm forward and back.
# - Klipper repeats that movement ten times for each selected motor.
# - The axis should therefore be moved away from its end stops first.
# - Extruders and [manual_stepper] sections are intentionally not tested.
######################################################################


######################################################################
# KAT_TEST_MOTORS
#
# Buzz every configured motion stepper, one at a time:
#   KAT_TEST_MOTORS
#
# Limit the test to a conventional single-letter axis:
#   KAT_TEST_MOTORS AXIS=X
#   KAT_TEST_MOTORS AXIS=Z
#
# AXIS matches the first character after "stepper_". The unfiltered
# command also supports non-Cartesian names such as stepper_a,
# stepper_left, or stepper_bed.
######################################################################
[gcode_macro KAT_TEST_MOTORS]
description: Buzz configured motion steppers one at a time
gcode:
    # AXIS is optional. Without it, ALL configured motion steppers are tested.
    # trim removes accidental spaces and upper makes x/X behave the same.
    {% set requested_axis = params.AXIS|default("ALL")|string|trim|upper %}

    # Jinja loop variables normally do not keep changes outside the loop.
    # A namespace lets us count how many matching motors were discovered.
    {% set result = namespace(found=0) %}

    # print_stats is normally available through KAT's [virtual_sdcard].
    # The fallback keeps this macro usable if a Klipper/Kalico setup does not
    # expose print_stats for some reason.
    {% set print_state = printer.print_stats.state|default("standby")|string|lower if 'print_stats' in printer else "standby" %}

    # Never disturb a machine that is printing or waiting in a paused print.
    {% if print_state in ["printing", "paused"] %}
        RESPOND TYPE=error MSG="KAT motor test refused while a print is {print_state}"

    # The axis shortcut is deliberately one letter: X, Y, Z, A, B, and so on.
    # Machines with descriptive names such as stepper_left should use ALL or
    # KAT_TEST_MOTOR STEPPER=stepper_left.
    {% elif requested_axis != "ALL" and requested_axis|length != 1 %}
        RESPOND TYPE=error MSG="KAT_TEST_MOTORS AXIS must be one letter, for example X or Z"
    {% else %}
        RESPOND PREFIX="KAT" MSG="Motor test: move each tested axis away from its end stops and keep the machine clear"

        # printer.configfile.settings contains the active config sections.
        # Selecting only names beginning with stepper_ automatically supports:
        # - Normal Cartesian/CoreXY motors: stepper_x, stepper_y, stepper_z
        # - Multiple motors on one rail: stepper_x1, stepper_z1, stepper_z2
        # - Non-Cartesian layouts: stepper_a, stepper_left, stepper_bed
        # It also excludes extruder and "manual_stepper name" sections.
        {% for section_name in printer.configfile.settings %}
            {% set stepper = section_name|string|lower %}
            {% if stepper[:8] == "stepper_" %}
                # The first character after stepper_ is used by AXIS filtering.
                # For example, both stepper_z and stepper_z2 belong to AXIS=Z.
                {% set stepper_axis = stepper[8:9]|upper %}
                {% if requested_axis == "ALL" or requested_axis == stepper_axis %}
                    {% set result.found = result.found + 1 %}
                    RESPOND PREFIX="KAT" MSG="Testing {stepper}"

                    # Klipper executes these generated commands in sequence,
                    # so only one motor buzzes at a time.
                    STEPPER_BUZZ STEPPER={stepper}
                {% endif %}
            {% endif %}
        {% endfor %}

        # A zero result usually means a typo in AXIS or an unusual config name.
        {% if result.found == 0 %}
            RESPOND TYPE=error MSG="No configured motion steppers matched AXIS={requested_axis}"
        {% else %}
            RESPOND PREFIX="KAT" MSG="Motor test complete: {result.found} stepper(s) tested"
        {% endif %}
    {% endif %}


######################################################################
# KAT_TEST_MOTOR
#
# Buzz one exact motion-stepper config section:
#   KAT_TEST_MOTOR STEPPER=stepper_z2
#   KAT_TEST_MOTOR STEPPER=stepper_left
######################################################################
[gcode_macro KAT_TEST_MOTOR]
description: Buzz one configured motion stepper by section name
gcode:
    # Normalize the supplied config-section name before validating it.
    {% set stepper = params.STEPPER|default("")|string|trim|lower %}
    {% set print_state = printer.print_stats.state|default("standby")|string|lower if 'print_stats' in printer else "standby" %}

    # Apply the same print-state safety guard as KAT_TEST_MOTORS.
    {% if print_state in ["printing", "paused"] %}
        RESPOND TYPE=error MSG="KAT motor test refused while a print is {print_state}"
    {% elif not stepper %}
        RESPOND TYPE=error MSG="Missing STEPPER. Example: KAT_TEST_MOTOR STEPPER=stepper_x"

    # Restrict this helper to motion steppers. An extruder buzz has different
    # safety considerations and should be tested explicitly outside this tool.
    {% elif stepper[:8] != "stepper_" %}
        RESPOND TYPE=error MSG="'{stepper}' is not a motion-stepper section (expected stepper_*)"

    # Check the exact section before asking Klipper to move anything. This
    # turns a misspelled name into a useful KAT message instead of a raw error.
    {% elif stepper not in printer.configfile.settings %}
        RESPOND TYPE=error MSG="Motion stepper '{stepper}' is not configured"
    {% else %}
        RESPOND PREFIX="KAT" MSG="Testing {stepper}; keep the machine clear and move the axis away from its end stops"
        STEPPER_BUZZ STEPPER={stepper}
    {% endif %}
