######################################################################
# KAT – Klipper Automation Toolkit
#
# Main KAT entrypoint.
#
# Add only one include to printer.cfg:
#
# [include KAT/kat.cfg]
#
# or, if KAT is installed as ~/printer_data/config/klipper_KAT:
#
# [include klipper_KAT/KAT/kat.cfg]
#
# This file loads the complete KAT macro suite in the correct order.
#
# Machine-specific configuration should still live in printer.cfg or
# separate machine config files:
#
# - steppers
# - heaters
# - fans
# - probes
# - accelerometers
# - resonance_tester
# - bed_mesh
# - quad_gantry_level
# - z_tilt
# - homing_override
#
# KAT defines how the printer is operated.
# printer.cfg defines what the machine is.
######################################################################


######################################################################
# Core Klipper baseline
#
# Common Klipper modules used by KAT.
######################################################################

[include KAT/core_features.cfg]


######################################################################
# Shared KAT variables
#
# Must be loaded before macros that read [gcode_macro KAT].
######################################################################

[include KAT/variables.cfg]


######################################################################
# Shared helpers and utility macros
######################################################################

[include KAT/temperature_control.cfg]
[include KAT/helpers.cfg]
[include KAT/filter.cfg]
[include KAT/prime.cfg]


######################################################################
# Print workflow macros
######################################################################

[include KAT/start_macro.cfg]
[include KAT/end_macro.cfg]
[include KAT/pause_resume.cfg]


######################################################################
# Advanced KAT features
#
# Requires gcode_shell_command.
#
# advanced_features.cfg currently includes:
# - shell command test
# - resonance_tools.cfg
#
# If Klipper fails to load with an error about [gcode_shell_command ...],
# install gcode_shell_command before including this file.
######################################################################

#[include KAT/advanced_features.cfg]
