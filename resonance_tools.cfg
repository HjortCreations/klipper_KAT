######################################################################
# KAT RESONANCE TOOLS
#
# Standard KAT tooling for running resonance tests and generating
# resonance and belt tension graphs from Klipper CSV files.
#
# Requirements:
# - gcode_shell_command support must be installed and enabled.
# - Klipper/Kalico resonance testing must be configured.
# - Klipper's scripts/calibrate_shaper.py must exist.
# - Klipper's scripts/graph_accelerometer.py must exist.
#
# Expected repository location:
# ~/printer_data/config/KAT/
#
# Expected script location:
# ~/printer_data/config/KAT/scripts/
#
# Expected output location:
# ~/printer_data/config/input_shaper/
#
# Notes:
# - X/Y resonance graphs use Klipper's calibrate_shaper.py.
# - Z resonance graph uses Klipper's graph_accelerometer.py.
# - Belt tension graph uses Klipper's graph_accelerometer.py.
# - TEST_RESONANCES AXIS=Z must be supported by the installed firmware.
######################################################################


######################################################################
# Shell commands
######################################################################

[gcode_shell_command kat_generate_resonance_graph_x]
command: bash ~/printer_data/config/KAT/scripts/generate-resonance-graph-x.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_resonance_graph_y]
command: bash ~/printer_data/config/KAT/scripts/generate-resonance-graph-y.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_resonance_graph_z]
command: bash ~/printer_data/config/KAT/scripts/generate-resonance-graph-z.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_belt_tension_graph]
command: bash ~/printer_data/config/KAT/scripts/generate-belt-tension-graph.sh
timeout: 180.
verbose: True


######################################################################
# RESONANCE CONFIGURATION HELP
#
# This helper is used when [resonance_tester] is not configured.
# The URL is written as plain text so UI clients that auto-link URLs can
# make it clickable.
######################################################################

[gcode_macro _KAT_RESONANCE_NOT_CONFIGURED]
description: Show resonance tester setup help
gcode:
    RESPOND PREFIX="KAT" MSG="Cannot run resonance test: [resonance_tester] is not configured"
    RESPOND PREFIX="KAT" MSG="Add [resonance_tester] and accelerometer configuration in printer.cfg"
    RESPOND PREFIX="KAT" MSG="Klipper guide:"
    RESPOND PREFIX="KAT" MSG="https://www.klipper3d.org/Measuring_Resonances.html"


######################################################################
# Full resonance test workflows
#
# These macros run TEST_RESONANCES first and then generate the graph.
######################################################################

[gcode_macro KAT_TEST_RESONANCES_X]
description: Run TEST_RESONANCES AXIS=X and generate the X resonance graph
gcode:
    {% if 'resonance_tester' not in printer %}
        _KAT_RESONANCE_NOT_CONFIGURED
    {% else %}
        RESPOND PREFIX="KAT" MSG="Running TEST_RESONANCES AXIS=X"
        TEST_RESONANCES AXIS=X
        RESPOND PREFIX="KAT" MSG="Generating X resonance graph"
        RUN_SHELL_COMMAND CMD=kat_generate_resonance_graph_x
    {% endif %}


[gcode_macro KAT_TEST_RESONANCES_Y]
description: Run TEST_RESONANCES AXIS=Y and generate the Y resonance graph
gcode:
    {% if 'resonance_tester' not in printer %}
        _KAT_RESONANCE_NOT_CONFIGURED
    {% else %}
        RESPOND PREFIX="KAT" MSG="Running TEST_RESONANCES AXIS=Y"
        TEST_RESONANCES AXIS=Y
        RESPOND PREFIX="KAT" MSG="Generating Y resonance graph"
        RUN_SHELL_COMMAND CMD=kat_generate_resonance_graph_y
    {% endif %}


[gcode_macro KAT_TEST_RESONANCES_Z]
description: Run TEST_RESONANCES AXIS=Z and generate the Z resonance graph
gcode:
    {% if 'resonance_tester' not in printer %}
        _KAT_RESONANCE_NOT_CONFIGURED
    {% else %}
        RESPOND PREFIX="KAT" MSG="Running TEST_RESONANCES AXIS=Z"
        RESPOND PREFIX="KAT" MSG="If AXIS=Z is not supported by this firmware/setup, Klipper will report it"
        TEST_RESONANCES AXIS=Z
        RESPOND PREFIX="KAT" MSG="Generating Z resonance graph"
        RUN_SHELL_COMMAND CMD=kat_generate_resonance_graph_z
    {% endif %}


######################################################################
# Belt tension graph
#
# This macro only generates the graph from the newest existing belt
# tension CSV files.
#
# The actual belt tension measurement command depends on the printer
# setup and should be run before this macro.
######################################################################

[gcode_macro KAT_GENERATE_BELT_TENSION_GRAPH]
description: Generate belt tension graph from the newest upper/lower belt CSV files
gcode:
    RESPOND PREFIX="KAT" MSG="Generating belt tension graph"
    RUN_SHELL_COMMAND CMD=kat_generate_belt_tension_graph
