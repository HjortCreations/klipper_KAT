###################################################################
# This includes the Klipper Automation Toolkit into your printer
###################################################################
[include KAT/core_feauters.cfg]
#[include KAT/advanced_feauters.cfg] # only enable if you have the shell_gcode_command installed

[filament_switch_sensor filament_runout]
pause_on_runout: False
runout_gcode:
    FILAMENT_RUNOUT

[filament_switch_sensor filament_clog]
pause_on_runout: False
runout_gcode:
    FILAMENT_CLOG
