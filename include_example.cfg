######################################################################
# KAT – Klipper Automation Toolkit include example
#
# Add this file content to your printer.cfg, or copy the relevant parts
# into your existing printer configuration.
#
# Recommended install layout:
#
# ~/printer_data/config/
# ├─ printer.cfg
# ├─ klipper_KAT/
# └─ KAT -> klipper_KAT/KAT
######################################################################


######################################################################
# KAT CORE
#
# This loads the core KAT macro suite.
######################################################################

[include KAT/core_features.cfg]


######################################################################
# KAT ADVANCED FEATURES
#
# Only enable this if gcode_shell_command is installed.
#
# Advanced features include:
# - KAT_TEST_SHELL_COMMAND
# - KAT_TEST_RESONANCES_X
# - KAT_TEST_RESONANCES_Y
# - KAT_TEST_RESONANCES_Z
# - KAT_GENERATE_BELT_TENSION_GRAPH
######################################################################

#[include KAT/advanced_features.cfg]


######################################################################
# FILTER FAN
#
# KAT expects the chamber/filter circulation fan to be named:
#
# [fan_generic filter]
#
# Used by:
# - FILTER_ON
# - FILTER_OFF
# - START_PRINT / END_PRINT helpers when available
#
# Change the pin to match your own controller board.
######################################################################

#[fan_generic filter]
#pin: YOUR_FILTER_FAN_PIN
#max_power: 1.0
#shutdown_speed: 0.0
#cycle_time: 0.010
#kick_start_time: 0.5


######################################################################
# EXHAUST FAN
#
# KAT expects the exhaust fan to be named:
#
# [fan_generic exhaust]
#
# Used by:
# - EXHAUST_ON
# - EXHAUST_OFF
# - START_PRINT / END_PRINT helpers when available
#
# Typical use:
# - Enable for PLA/PETG or other materials where chamber heat should be
#   vented.
# - Keep off for high-temperature materials where chamber heat should be
#   retained.
#
# Change the pin to match your own controller board.
######################################################################

#[fan_generic exhaust]
#pin: YOUR_EXHAUST_FAN_PIN
#max_power: 1.0
#shutdown_speed: 0.0
#cycle_time: 0.010
#kick_start_time: 0.5


######################################################################
# FILAMENT RUNOUT SENSOR EXAMPLE
#
# KAT expects sensors to call FILAMENT_RUNOUT instead of letting the
# sensor section pause the printer directly.
#
# Change switch_pin to match your own controller board.
######################################################################

#[filament_switch_sensor filament_runout]
#switch_pin: YOUR_RUNOUT_SENSOR_PIN
#pause_on_runout: False
#runout_gcode:
#    FILAMENT_RUNOUT


######################################################################
# FILAMENT CLOG / MOTION SENSOR EXAMPLE
#
# For clog detection, a filament motion sensor is usually more suitable
# than a simple switch sensor.
#
# Change switch_pin and extruder to match your own setup.
######################################################################

#[filament_motion_sensor filament_clog]
#switch_pin: YOUR_CLOG_SENSOR_PIN
#detection_length: 7.0
#extruder: extruder
#pause_on_runout: False
#runout_gcode:
#    FILAMENT_CLOG
