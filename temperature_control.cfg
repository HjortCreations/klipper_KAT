######################################################################
# TEMPERATURE CONTROL
#
# This file provides smart temperature handling for hotend and bed:
#
# - M109 uses TEMPERATURE_WAIT instead of the default wait behavior.
#   This is generally more MPC-friendly.
#
# - KAT bed helpers automatically detect whether a real [heater_bed]
#   exists in the loaded printer configuration.
#
# - If [heater_bed] exists, the helpers use Klipper's M140 and M190.
#
# - If [heater_bed] does not exist, the macros only print clear console
#   messages for printers using an external bed heater.
######################################################################


######################################################################
# M109 - SMART HOTEND HEAT AND WAIT
#
# Why override M109:
# - Standard M109 waits for hotend temperature.
# - This version uses TEMPERATURE_WAIT, which is often a better fit
#   for MPC-based temperature control.
#
# Macro variables:
# - wait_min_offset: Allowed undershoot before continuing.
# - wait_max_offset: Allowed overshoot before continuing.
######################################################################
[gcode_macro M109]
rename_existing: M109.1
description: Smart hotend heat and wait using TEMPERATURE_WAIT
gcode:
    # Requested hotend temperature from the S parameter.
    {% set target = params.S|default(0)|float %}

    # Load shared KAT variables.
    {% set kat = printer["gcode_macro KAT"] %}

    # Temperature wait window.
    {% set min_offset = kat.hotend_wait_min_offset|float %}
    {% set max_offset = kat.hotend_wait_max_offset|float %}
    {% set prefix = kat.hotend_wait_prefix %}

    # Forward all original parameters to M104.
    RESPOND PREFIX={prefix} MSG="Waiting for nozzle to reach {target}C"
    M104 {% for p in params %}{'%s%s ' % (p, params[p])}{% endfor %}

    # Wait only if target temperature is above 0C.
    {% if target > 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target - min_offset} MAXIMUM={target + max_offset}
    {% endif %}

######################################################################
# KAT_SET_BED_TEMPERATURE
#
# Behavior:
# - If [heater_bed] exists, set its target with M140.
# - If no [heater_bed] exists, print an informational message instead.
######################################################################
[gcode_macro KAT_SET_BED_TEMPERATURE]
description: Smart bed temperature set command
gcode:
    # Requested bed temperature from the S parameter.
    {% set target = params.S|default(0)|float %}

    # Check whether a real bed heater exists in the printer config.
    {% if printer.configfile.settings.heater_bed is defined %}
        # A real heated bed is available, so use Klipper's command.
        M140 {% for p in params %}{'%s%s ' % (p, params[p])}{% endfor %}
    {% else %}
        # No bed heater is configured, so only show a helpful message.
        RESPOND PREFIX="BED" MSG="Set external bed heater to {target}C"
    {% endif %}


######################################################################
# KAT_WAIT_BED_TEMPERATURE
#
# Behavior:
# - If [heater_bed] exists, set and wait for its target with M190.
# - If no [heater_bed] exists, print an informational message instead.
######################################################################
[gcode_macro KAT_WAIT_BED_TEMPERATURE]
description: Smart bed heat and wait command
gcode:
    # Requested bed temperature from the S parameter.
    {% set target = params.S|default(0)|float %}

    # Check whether a real bed heater exists in the printer config.
    {% if printer.configfile.settings.heater_bed is defined %}
        # A real heated bed is available, so use Klipper's command.
        M190 {% for p in params %}{'%s%s ' % (p, params[p])}{% endfor %}
    {% else %}
        # No bed heater is configured, so only show a helpful message.
        RESPOND PREFIX="BED" MSG="Ensure external bed is at {target}C before printing"
    {% endif %}
