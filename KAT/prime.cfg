#####################################################################
# KAT – Prime
# Smart park + line/blob priming for Klipper and Kalico
#
# Purpose:
#   - Move the toolhead close to the actual prime location before priming
#   - Avoid unnecessary travel before print start
#   - Support both line prime and blob prime
#   - Use printer axis limits instead of hardcoded 0,0 assumptions
#   - Avoid bed_mesh dependency for prime placement
#
# Recommended START_PRINT order:
#   1. Heat bed
#   2. Home
#   3. QGL / Z_TILT if available
#   4. Heat hotend
#   5. Z home / Beacon contact / calibration if needed
#   6. Bed mesh / adaptive mesh if used
#   7. KAT_PRIME
#   8. Start print
#
# Requirements for adaptive placement:
#   - [exclude_object] must be enabled
#   - Slicer must provide object information
#
# If object data is missing, KAT falls back to a safe axis-minimum prime
# position based on configured machine limits.
#####################################################################


#####################################################################
# KAT_PRIME
#
# Main user-facing prime macro.
#
# Usage:
#   KAT_PRIME
#   KAT_PRIME TYPE=LINE
#   KAT_PRIME TYPE=BLOB
#
# TYPE overrides variable_prime_type for this call only.
#####################################################################

[gcode_macro KAT_PRIME]
description: Smart park and prime before print start
gcode:
    {% set vars = printer["gcode_macro KAT_VARS"] %}

    # Prime type can be set globally in KAT_VARS or overridden with TYPE=
    {% set prime_type = params.TYPE|default(vars.prime_type)|string|lower %}

    # Smart park is default before prime so the toolhead does not move
    # around more than necessary after the printer is ready.
    {% if vars.prime_smart_park_enable|int == 1 %}
        KAT_SMART_PARK_FOR_PRIME TYPE={prime_type}
    {% endif %}

    {% if prime_type == "blob" %}
        KAT_BLOB_PRIME
    {% elif prime_type == "line" %}
        KAT_LINE_PRIME
    {% else %}
        RESPOND PREFIX="KAT" MSG="Unknown prime type '{prime_type}'. Valid options are LINE or BLOB."
    {% endif %}


#####################################################################
# KAT_SMART_PARK_FOR_PRIME
#
# Parks the toolhead at the calculated prime start position before
# actual priming starts.
#
# This keeps the toolhead close to where it needs to be and avoids
# extra travel after mesh/heat/calibration is complete.
#####################################################################

[gcode_macro KAT_SMART_PARK_FOR_PRIME]
description: Park near the calculated prime position before priming
gcode:
    {% set vars = printer["gcode_macro KAT_VARS"] %}

    {% set prime_type = params.TYPE|default(vars.prime_type)|string|lower %}
    {% set park_z = vars.prime_park_z|float %}
    {% set travel_speed = vars.prime_travel_speed|float %}

    # Read machine limits from Klipper/Kalico.
    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}

    {% set margin = vars.park_margin|float %}
    {% set safe_x_min = x_min + margin %}
    {% set safe_x_max = x_max - margin %}
    {% set safe_y_min = y_min + margin %}
    {% set safe_y_max = y_max - margin %}

    # Get calculated prime position.
    {% if prime_type == "blob" %}
        {% set pos = printer["gcode_macro KAT_BLOB_PRIME_POSITION"] %}
        KAT_BLOB_PRIME_POSITION
        {% set start_x = printer["gcode_macro KAT_BLOB_PRIME_POSITION"].x|float %}
        {% set start_y = printer["gcode_macro KAT_BLOB_PRIME_POSITION"].y|float %}
    {% else %}
        KAT_LINE_PRIME_POSITION
        {% set start_x = printer["gcode_macro KAT_LINE_PRIME_POSITION"].x|float %}
        {% set start_y = printer["gcode_macro KAT_LINE_PRIME_POSITION"].y|float %}
    {% endif %}

    {% set park_x = [[start_x, safe_x_min]|max, safe_x_max]|min %}
    {% set park_y = [[start_y, safe_y_min]|max, safe_y_max]|min %}

    {% if vars.prime_verbose|int == 1 %}
        RESPOND PREFIX="KAT" MSG="Smart park for prime at X{park_x|round(3)} Y{park_y|round(3)} Z{park_z|round(3)}"
    {% endif %}

    SAVE_GCODE_STATE NAME=KAT_SMART_PARK_FOR_PRIME_STATE

    G90
    G0 Z{park_z} F{printer.toolhead.max_z_velocity * 60}
    G0 X{park_x} Y{park_y} F{travel_speed}

    RESTORE_GCODE_STATE NAME=KAT_SMART_PARK_FOR_PRIME_STATE


#####################################################################
# KAT_LINE_PRIME_POSITION
#
# Calculates where the line prime should start.
#
# Stores result in:
#   variable_x
#   variable_y
#   variable_axis
#
# axis = x means the purge line moves along X.
# axis = y means the purge line moves along Y.
#####################################################################

[gcode_macro KAT_LINE_PRIME_POSITION]
description: Internal helper. Calculates line prime start position.
variable_x: 0.0
variable_y: 0.0
variable_axis: "x"
variable_location: "fallback"
gcode:
    {% set vars = printer["gcode_macro KAT_VARS"] %}

    {% set purge_margin = vars.prime_margin|float %}
    {% set park_margin = vars.park_margin|float %}
    {% set purge_length = vars.line_prime_length|float %}
    {% set requested_location = vars.prime_location|string|lower %}

    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}

    {% set safe_x_min = x_min + park_margin %}
    {% set safe_x_max = x_max - park_margin %}
    {% set safe_y_min = y_min + park_margin %}
    {% set safe_y_max = y_max - park_margin %}

    # Get object points if exclude_object data exists.
    {% if printer.exclude_object is defined and printer.exclude_object.objects|length > 0 %}
        {% set all_points = printer.exclude_object.objects|map(attribute='polygon')|sum(start=[]) %}
    {% else %}
        {% set all_points = [] %}
    {% endif %}

    # Use object bounds when available. Otherwise fall back to a known safe area.
    {% if all_points|length > 0 %}
        {% set obj_x_min = all_points|map(attribute=0)|min %}
        {% set obj_x_max = all_points|map(attribute=0)|max %}
        {% set obj_y_min = all_points|map(attribute=1)|min %}
        {% set obj_y_max = all_points|map(attribute=1)|max %}
    {% else %}
        {% set obj_x_min = safe_x_min + purge_margin %}
        {% set obj_x_max = safe_x_min + purge_margin + purge_length %}
        {% set obj_y_min = safe_y_min + purge_margin %}
        {% set obj_y_max = safe_y_min + purge_margin + purge_length %}
    {% endif %}

    # Center line around object where possible.
    {% set x_center_start = ((obj_x_min + obj_x_max) / 2.0) - (purge_length / 2.0) %}
    {% set y_center_start = ((obj_y_min + obj_y_max) / 2.0) - (purge_length / 2.0) %}

    {% set x_start_centered = [[x_center_start, safe_x_min]|max, safe_x_max - purge_length]|min %}
    {% set y_start_centered = [[y_center_start, safe_y_min]|max, safe_y_max - purge_length]|min %}

    # Candidate positions around the object.
    {% set y_min_origin = obj_y_min - purge_margin %}
    {% set y_max_origin = obj_y_max + purge_margin %}
    {% set x_min_origin = obj_x_min - purge_margin %}
    {% set x_max_origin = obj_x_max + purge_margin %}

    {% set can_y_min = y_min_origin >= safe_y_min %}
    {% set can_y_max = y_max_origin <= safe_y_max %}
    {% set can_x_min = x_min_origin >= safe_x_min %}
    {% set can_x_max = x_max_origin <= safe_x_max %}

    # Select location. Coordinate-based naming is used instead of front/rear
    # because not all printers define origin in the same physical corner.
    {% if requested_location == "near_y_min" and can_y_min %}
        {% set start_x = x_start_centered %}
        {% set start_y = y_min_origin %}
        {% set axis = "x" %}
        {% set selected = "near_y_min" %}
    {% elif requested_location == "near_y_max" and can_y_max %}
        {% set start_x = x_start_centered %}
        {% set start_y = y_max_origin %}
        {% set axis = "x" %}
        {% set selected = "near_y_max" %}
    {% elif requested_location == "near_x_min" and can_x_min %}
        {% set start_x = x_min_origin %}
        {% set start_y = y_start_centered %}
        {% set axis = "y" %}
        {% set selected = "near_x_min" %}
    {% elif requested_location == "near_x_max" and can_x_max %}
        {% set start_x = x_max_origin %}
        {% set start_y = y_start_centered %}
        {% set axis = "y" %}
        {% set selected = "near_x_max" %}
    {% elif can_y_min %}
        {% set start_x = x_start_centered %}
        {% set start_y = y_min_origin %}
        {% set axis = "x" %}
        {% set selected = "near_y_min" %}
    {% elif can_x_min %}
        {% set start_x = x_min_origin %}
        {% set start_y = y_start_centered %}
        {% set axis = "y" %}
        {% set selected = "near_x_min" %}
    {% elif can_y_max %}
        {% set start_x = x_start_centered %}
        {% set start_y = y_max_origin %}
        {% set axis = "x" %}
        {% set selected = "near_y_max" %}
    {% elif can_x_max %}
        {% set start_x = x_max_origin %}
        {% set start_y = y_start_centered %}
        {% set axis = "y" %}
        {% set selected = "near_x_max" %}
    {% else %}
        {% set start_x = safe_x_min %}
        {% set start_y = safe_y_min %}
        {% set axis = "x" %}
        {% set selected = "fallback_axis_min" %}
    {% endif %}

    SET_GCODE_VARIABLE MACRO=KAT_LINE_PRIME_POSITION VARIABLE=x VALUE={start_x}
    SET_GCODE_VARIABLE MACRO=KAT_LINE_PRIME_POSITION VARIABLE=y VALUE={start_y}
    SET_GCODE_VARIABLE MACRO=KAT_LINE_PRIME_POSITION VARIABLE=axis VALUE='"{axis}"'
    SET_GCODE_VARIABLE MACRO=KAT_LINE_PRIME_POSITION VARIABLE=location VALUE='"{selected}"'


#####################################################################
# KAT_LINE_PRIME
#
# Draws a purge line near the print object.
#####################################################################

[gcode_macro KAT_LINE_PRIME]
description: Prime nozzle with an adaptive purge line
gcode:
    {% set vars = printer["gcode_macro KAT_VARS"] %}

    KAT_LINE_PRIME_POSITION

    {% set start_x = printer["gcode_macro KAT_LINE_PRIME_POSITION"].x|float %}
    {% set start_y = printer["gcode_macro KAT_LINE_PRIME_POSITION"].y|float %}
    {% set axis = printer["gcode_macro KAT_LINE_PRIME_POSITION"].axis|string %}
    {% set location = printer["gcode_macro KAT_LINE_PRIME_POSITION"].location|string %}

    {% set purge_height = vars.line_prime_height|float %}
    {% set purge_length = vars.line_prime_length|float %}
    {% set purge_amount = vars.line_prime_amount|float %}
    {% set tip_distance = vars.prime_tip_distance|float %}
    {% set travel_speed = vars.prime_travel_speed|float %}
    {% set retract_length = vars.prime_retract_length|float %}
    {% set retract_speed = vars.prime_retract_speed|float %}
    {% set wipe_move = vars.prime_wipe_move|float %}

    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}
    {% set park_margin = vars.park_margin|float %}
    {% set safe_x_max = x_max - park_margin %}
    {% set safe_y_max = y_max - park_margin %}

    # Use firmware retraction if it exists. Otherwise use local fallback.
    {% if printer.firmware_retraction is defined %}
        {% set retract_cmd = "G10" %}
    {% else %}
        {% set retract_cmd = "G1 E-" ~ retract_length ~ " F" ~ retract_speed %}
    {% endif %}

    # KAMP checks max_extrude_cross_section. Keep the same practical safety.
    {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section|default(0.64)|float %}

    {% if cross_section < 5 %}
        RESPOND PREFIX="KAT" MSG="Line prime skipped: max_extrude_cross_section is below 5. Set max_extrude_cross_section: 5 or higher."
    {% else %}

        {% if vars.prime_verbose|int == 1 %}
            RESPOND PREFIX="KAT" MSG="Line prime at X{start_x|round(3)} Y{start_y|round(3)}, axis={axis}, location={location}, length={purge_length|round(1)}mm"
        {% endif %}

        SAVE_GCODE_STATE NAME=KAT_LINE_PRIME_STATE

        G90
        M83
        G92 E0

        # Smart park already moved close to this point, so this should usually
        # only be a small correction move.
        G0 X{start_x} Y{start_y} F{travel_speed}
        G0 Z{purge_height} F{printer.toolhead.max_z_velocity * 60}

        {% if tip_distance > 0 %}
            G1 E{tip_distance} F{vars.line_prime_feedrate|float}
        {% endif %}

        {% if axis == "x" %}
            G1 X{start_x + purge_length} E{purge_amount} F{vars.line_prime_feedrate|float}
            {retract_cmd}
            G0 X{[start_x + purge_length + wipe_move, safe_x_max]|min} F{travel_speed}
        {% else %}
            G1 Y{start_y + purge_length} E{purge_amount} F{vars.line_prime_feedrate|float}
            {retract_cmd}
            G0 Y{[start_y + purge_length + wipe_move, safe_y_max]|min} F{travel_speed}
        {% endif %}

        G92 E0
        G0 Z{purge_height * 2.0} F{printer.toolhead.max_z_velocity * 60}

        RESTORE_GCODE_STATE NAME=KAT_LINE_PRIME_STATE

    {% endif %}


#####################################################################
# KAT_BLOB_PRIME_POSITION
#
# Calculates blob prime start position.
#
# For now this uses a configured fixed prime corner, clamped to machine
# axis limits. This is intentional: blob prime is best kept predictable.
#####################################################################

[gcode_macro KAT_BLOB_PRIME_POSITION]
description: Internal helper. Calculates blob prime start position.
variable_x: 0.0
variable_y: 0.0
gcode:
    {% set vars = printer["gcode_macro KAT_VARS"] %}

    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}
    {% set margin = vars.park_margin|float %}

    {% set safe_x_min = x_min + margin %}
    {% set safe_x_max = x_max - margin %}
    {% set safe_y_min = y_min + margin %}
    {% set safe_y_max = y_max - margin %}

    {% set requested_x = vars.blob_prime_x|float %}
    {% set requested_y = vars.blob_prime_y|float %}

    {% set start_x = [[requested_x, safe_x_min]|max, safe_x_max]|min %}
    {% set start_y = [[requested_y, safe_y_min]|max, safe_y_max]|min %}

    SET_GCODE_VARIABLE MACRO=KAT_BLOB_PRIME_POSITION VARIABLE=x VALUE={start_x}
    SET_GCODE_VARIABLE MACRO=KAT_BLOB_PRIME_POSITION VARIABLE=y VALUE={start_y}


#####################################################################
# KAT_BLOB_PRIME
#
# Blob prime inspired by the RatOS/KAMP style:
#   1. Move to prime position
#   2. Create a blob
#   3. Lift while extruding to break away
#   4. Wipe away from the blob
#
# No probing is performed here.
#####################################################################

[gcode_macro KAT_BLOB_PRIME]
description: Prime nozzle with a blob and wipe
gcode:
    {% set vars = printer["gcode_macro KAT_VARS"] %}

    KAT_BLOB_PRIME_POSITION

    {% set start_x = printer["gcode_macro KAT_BLOB_PRIME_POSITION"].x|float %}
    {% set start_y = printer["gcode_macro KAT_BLOB_PRIME_POSITION"].y|float %}

    {% set travel_speed = vars.prime_travel_speed|float %}
    {% set z_speed = printer.toolhead.max_z_velocity * 60 %}

    {% set start_height = vars.blob_prime_start_height|float %}
    {% set lift_height = vars.blob_prime_lift_height|float %}
    {% set blob_amount = vars.blob_prime_amount|float %}
    {% set lift_amount = vars.blob_prime_lift_amount|float %}
    {% set wipe_amount = vars.blob_prime_wipe_amount|float %}
    {% set wipe_length = vars.blob_prime_wipe_length|float %}
    {% set breakaway_length = vars.blob_prime_breakaway_length|float %}
    {% set fan_speed = vars.blob_prime_fan_speed|int %}
    {% set direction = vars.blob_prime_direction|string|lower %}

    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}
    {% set margin = vars.park_margin|float %}

    {% set safe_x_min = x_min + margin %}
    {% set safe_x_max = x_max - margin %}
    {% set safe_y_min = y_min + margin %}
    {% set safe_y_max = y_max - margin %}

    # Decide wipe direction. Coordinate-based instead of front/rear.
    {% if direction == "y-" %}
        {% set dx = 0 %}
        {% set dy = -1 %}
    {% elif direction == "x+" %}
        {% set dx = 1 %}
        {% set dy = 0 %}
    {% elif direction == "x-" %}
        {% set dx = -1 %}
        {% set dy = 0 %}
    {% else %}
        {% set dx = 0 %}
        {% set dy = 1 %}
    {% endif %}

    {% set pre_x = [[start_x + (dx * 15.0), safe_x_min]|max, safe_x_max]|min %}
    {% set pre_y = [[start_y + (dy * 15.0), safe_y_min]|max, safe_y_max]|min %}

    {% set wipe_x = [[start_x + (dx * wipe_length), safe_x_min]|max, safe_x_max]|min %}
    {% set wipe_y = [[start_y + (dy * wipe_length), safe_y_min]|max, safe_y_max]|min %}

    {% set break_x = [[start_x + (dx * breakaway_length), safe_x_min]|max, safe_x_max]|min %}
    {% set break_y = [[start_y + (dy * breakaway_length), safe_y_min]|max, safe_y_max]|min %}

    {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section|default(0.64)|float %}

    {% if cross_section < 5 %}
        RESPOND PREFIX="KAT" MSG="Blob prime skipped: max_extrude_cross_section is below 5. Set max_extrude_cross_section: 5 or higher."
    {% else %}

        {% if vars.prime_verbose|int == 1 %}
            RESPOND PREFIX="KAT" MSG="Blob prime at X{start_x|round(3)} Y{start_y|round(3)}, direction={direction}"
        {% endif %}

        SAVE_GCODE_STATE NAME=KAT_BLOB_PRIME_STATE

        G90
        M83
        G92 E0

        # Move close to the blob position from the configured wipe direction.
        # Smart park should already have moved near start_x/start_y.
        G0 Z{vars.prime_park_z|float} F{z_speed}
        G0 X{pre_x} Y{pre_y} F{travel_speed}

        # Lower to blob height and move into final blob position.
        G1 Z{start_height} F{z_speed}
        G1 X{start_x} Y{start_y} F{travel_speed}

        # Create the blob slowly.
        G1 E{blob_amount} F{vars.blob_prime_blob_feedrate|float}

        # Use part cooling briefly to firm up the blob.
        M106 S{fan_speed}

        # Lift while extruding. This helps the nozzle break away from the blob.
        G1 Z{lift_height} E{lift_amount} F{vars.blob_prime_lift_feedrate|float}

        # Wipe away from the blob while still extruding slightly.
        G1 X{wipe_x} Y{wipe_y} E{wipe_amount} F{vars.blob_prime_wipe_feedrate|float}

        # Go back down during the wipe. Broken into smaller Z moves to avoid
        # very large Z transitions during priming.
        G1 X{[[start_x + (dx * (wipe_length * 0.60)), safe_x_min]|max, safe_x_max]|min} Y{[[start_y + (dy * (wipe_length * 0.60)), safe_y_min]|max, safe_y_max]|min} Z3.8 E0.5 F{vars.blob_prime_wipe_feedrate|float}
        G1 X{[[start_x + (dx * (wipe_length * 0.70)), safe_x_min]|max, safe_x_max]|min} Y{[[start_y + (dy * (wipe_length * 0.70)), safe_y_min]|max, safe_y_max]|min} Z2.6 E0.5 F{vars.blob_prime_wipe_feedrate|float}
        G1 X{[[start_x + (dx * (wipe_length * 0.80)), safe_x_min]|max, safe_x_max]|min} Y{[[start_y + (dy * (wipe_length * 0.80)), safe_y_min]|max, safe_y_max]|min} Z1.4 E0.5 F{vars.blob_prime_wipe_feedrate|float}
        G1 X{wipe_x} Y{wipe_y} Z0.2 E0.5 F{vars.blob_prime_wipe_feedrate|float}

        # Turn part cooling back off before print starts.
        M106 S0

        # Small final wipe and breakaway move.
        G1 X{wipe_x} Y{wipe_y} Z0.2 E0.6 F{vars.blob_prime_wipe_feedrate|float}
        G1 X{break_x} Y{break_y} F{travel_speed}

        G92 E0

        RESTORE_GCODE_STATE NAME=KAT_BLOB_PRIME_STATE

    {% endif %}
