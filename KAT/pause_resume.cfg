######################################################################
# PAUSE / RESUME CONTROL
#
# This file centralizes all pause-related logic for KAT.
#
# Included macros:
# - _KAT_PAUSE       Internal shared pause handler
# - PAUSE            Manual pause entry point
# - FILAMENT_RUNOUT  Runout-triggered pause entry point
# - FILAMENT_CLOG    Clog-triggered pause entry point
# - RESUME           Restore temperature, fan state, filament state, and print motion
# - CANCEL_PRINT     Cancel the active print using KAT shutdown flow
# - CLEAR_PAUSE      Clear pause state and reset stored KAT pause values
#
# Notes:
# - All user-adjustable values are expected to live in [gcode_macro KAT].
# - This file does not change idle timeout.
# - Park and Z-hop movement should be handled by helpers if available.
# - Filament resume checking is optional and only runs if a sensor name is configured.
######################################################################


######################################################################
# INTERNAL PAUSE HANDLER
#
# Performs the actual pause actions used by manual pause and automatic
# filament event handling.
#
# Behavior:
# - Saves hotend target and part cooling fan speed
# - Lets Klipper capture the resume position using PAUSE_BASE
# - Retracts only if the active extruder can currently extrude
# - Uses SAFE_PAUSE_Z_HOP if available
# - Uses PARK_TOOLHEAD with a named park position if available
# - Turns off part cooling fan during pause
# - Drops hotend to standby temperature if configured
######################################################################
[gcode_macro _KAT_PAUSE]
description: Internal shared pause handler for KAT
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set th = printer.toolhead %}
    {% set is_klipper_paused = printer.pause_resume.is_paused|int %}

    # Active extruder handling. Most printers use "extruder", but this
    # keeps the macro safer for setups where toolhead.extruder is set.
    {% set active_extruder = th.extruder|default("extruder") %}
    {% set has_extruder = active_extruder|length > 0 and active_extruder in printer %}
    {% set hotend_target = printer[active_extruder].target|float if has_extruder else 0.0 %}
    {% set can_extrude = printer[active_extruder].can_extrude|string|lower == 'true' if has_extruder else false %}

    # Saved part cooling fan speed. If no [fan] section exists, store 0.
    {% set fan_speed = printer.fan.speed|float if 'fan' in printer else 0.0 %}

    # User-adjustable pause values from KAT, with safe defaults.
    {% set pause_park_position = kat.pause_park_position|default("front_center")|string|lower %}
    {% set standby_temp = kat.pause_standby_temp|default(150.0)|float %}
    {% set retract = kat.pause_retract|default(2.0)|float %}
    {% set retract_feed = kat.pause_retract_feed|default(1800.0)|float %}
    {% set pause_reason = kat.pause_reason|default("manual")|string %}

    # Ignore repeated pause requests once Klipper is already paused.
    {% if is_klipper_paused == 1 %}
        RESPOND PREFIX="PAUSE" MSG="Pause request ignored because the printer is already paused"
    {% else %}
        ##################################################################
        # Save restore state before any pause actions are applied.
        ##################################################################
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=1
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE={hotend_target}
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE={fan_speed}
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0

        ##################################################################
        # Let Klipper capture the resume position before extra moves happen.
        ##################################################################
        PAUSE_BASE

        ##################################################################
        # Retract filament only when extrusion is currently allowed.
        ##################################################################
        {% if retract > 0 and can_extrude %}
            M83
            G1 E-{retract} F{retract_feed}
            SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=1
        {% elif retract > 0 %}
            RESPOND PREFIX="PAUSE" MSG="Pause retract skipped because the active extruder is not ready"
        {% endif %}

        ##################################################################
        # Safe Z-hop helper.
        ##################################################################
        {% if 'gcode_macro SAFE_PAUSE_Z_HOP' in printer %}
            SAFE_PAUSE_Z_HOP
        {% else %}
            RESPOND PREFIX="Z" MSG="SAFE_PAUSE_Z_HOP not found, skipping pause Z hop"
        {% endif %}

        ##################################################################
        # Named park helper.
        ##################################################################
        {% if 'gcode_macro PARK_TOOLHEAD' in printer %}
            PARK_TOOLHEAD POSITION={pause_park_position}
        {% else %}
            RESPOND PREFIX="PARK" MSG="PARK_TOOLHEAD not found, skipping pause park move"
        {% endif %}

        ##################################################################
        # Pause thermal and fan behavior.
        ##################################################################
        M107

        {% if standby_temp > 0 and hotend_target > standby_temp %}
            RESPOND PREFIX="TEMP" MSG="Dropping nozzle to pause standby temperature: {standby_temp}C"
            M104 S{standby_temp}
        {% endif %}

        ##################################################################
        # Show a clear pause reason in the console.
        ##################################################################
        {% if pause_reason == "runout" %}
            RESPOND PREFIX="PAUSE" MSG="Print paused due to filament runout"
        {% elif pause_reason == "clog" %}
            RESPOND PREFIX="PAUSE" MSG="Print paused due to filament clog"
        {% else %}
            RESPOND PREFIX="PAUSE" MSG="Print paused"
        {% endif %}
    {% endif %}


######################################################################
# MANUAL PAUSE
#
# Sets the pause reason to "manual" and then calls the shared KAT pause
# handler.
######################################################################
[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
description: Pause the active print using KAT pause logic
gcode:
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
    _KAT_PAUSE


######################################################################
# FILAMENT RUNOUT
#
# Handles filament runout events from a filament switch or motion sensor.
# Sensor sections should call this macro from runout_gcode and keep
# pause_on_runout disabled.
######################################################################
[gcode_macro FILAMENT_RUNOUT]
description: Handle filament runout events
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    # Ignore repeated triggers if the printer is already paused.
    {% if kat.is_paused|default(0)|int == 1 %}
        RESPOND PREFIX="FILAMENT" MSG="Runout detected, but the printer is already paused"
    {% else %}
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"runout"'
        RESPOND PREFIX="FILAMENT" MSG="Filament runout detected - pausing print"
        RESPOND PREFIX="FILAMENT" MSG="Load new filament and resume when ready"
        _KAT_PAUSE
    {% endif %}


######################################################################
# FILAMENT CLOG
#
# Handles filament clog or jam events from a clog sensor.
######################################################################
[gcode_macro FILAMENT_CLOG]
description: Handle filament clog events
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    # Ignore repeated triggers if the printer is already paused.
    {% if kat.is_paused|default(0)|int == 1 %}
        RESPOND PREFIX="FILAMENT" MSG="Clog detected, but the printer is already paused"
    {% else %}
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"clog"'
        RESPOND PREFIX="FILAMENT" MSG="Filament clog detected - pausing print"
        RESPOND PREFIX="FILAMENT" MSG="Check nozzle, extruder, and filament path before resuming"
        _KAT_PAUSE
    {% endif %}


######################################################################
# RESUME
#
# Restores the print after a KAT-managed pause.
#
# Behavior:
# - Optionally checks a configured filament sensor before doing anything else
# - Restores hotend target and waits before motion resumes
# - Restores part cooling fan speed
# - Restores pause retract if one was applied
# - Hands position recovery back to Klipper's RESUME_BASE
# - Clears saved KAT pause state after resume
#
# Filament check:
# - Set KAT variable_resume_filament_sensor to the full sensor object name,
#   for example: "filament_switch_sensor filament_runout"
# - If no sensor is configured, the check is skipped.
# - If the sensor exists but is disabled, the check is skipped.
# - If the sensor is enabled and reports no filament, RESUME is aborted.
######################################################################
[gcode_macro RESUME]
rename_existing: RESUME_BASE
description: Resume the active print after a KAT-managed pause
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set th = printer.toolhead %}

    # Saved state from the pause sequence.
    {% set restore_temp = kat.pause_restore_temp|default(0.0)|float %}
    {% set restore_fan = kat.pause_restore_fan|default(0.0)|float %}
    {% set pause_reason = kat.pause_reason|default("manual")|string %}
    {% set pause_retracted = kat.pause_retracted|default(0)|int %}
    {% set pause_retract = kat.pause_retract|default(2.0)|float %}
    {% set pause_retract_feed = kat.pause_retract_feed|default(1800.0)|float %}

    # Optional filament sensor check before heating and resuming.
    {% set resume_sensor = kat.resume_filament_sensor|default("")|string|replace('"', '')|trim %}
    {% set filament_ok = true %}

    {% if resume_sensor|length > 0 %}
        {% if resume_sensor not in printer %}
            RESPOND PREFIX="FILAMENT" MSG="Configured resume filament sensor '{resume_sensor}' was not found"
            {% set filament_ok = false %}
        {% else %}
            {% set sensor_enabled = printer[resume_sensor].enabled|string|lower == 'true' %}
            {% set filament_detected = printer[resume_sensor].filament_detected|string|lower == 'true' %}

            {% if sensor_enabled and not filament_detected %}
                RESPOND PREFIX="FILAMENT" MSG="Resume aborted because '{resume_sensor}' does not detect filament"
                RESPOND PREFIX="FILAMENT" MSG="Load filament and press RESUME again"
                {% set filament_ok = false %}
            {% elif not sensor_enabled %}
                RESPOND PREFIX="FILAMENT" MSG="Resume filament sensor is disabled, skipping filament check"
            {% else %}
                RESPOND PREFIX="FILAMENT" MSG="Filament detected, resume check passed"
            {% endif %}
        {% endif %}
    {% endif %}

    # Ignore resume if no KAT-managed pause is active.
    {% if kat.is_paused|default(0)|int == 0 %}
        RESPOND PREFIX="PRINT" MSG="No active KAT pause, skipping resume"

    {% elif not filament_ok %}
        RESPOND PREFIX="PRINT" MSG="Resume skipped"

    {% else %}
        ##################################################################
        # User feedback.
        ##################################################################
        {% if pause_reason == "runout" %}
            RESPOND PREFIX="PRINT" MSG="Resuming print after filament runout"
        {% elif pause_reason == "clog" %}
            RESPOND PREFIX="PRINT" MSG="Resuming print after filament clog"
        {% elif pause_reason == "manual" %}
            RESPOND PREFIX="PRINT" MSG="Resuming manually paused print"
        {% else %}
            RESPOND PREFIX="PRINT" MSG="Resuming print"
        {% endif %}

        ##################################################################
        # Restore hotend target before motion resumes.
        # No separate hotend readiness guard is needed because M109 waits.
        ##################################################################
        {% if restore_temp > 0 %}
            RESPOND PREFIX="TEMP" MSG="Restoring nozzle temperature to {restore_temp}C"
            M109 S{restore_temp}
        {% endif %}

        ##################################################################
        # Restore part cooling fan before motion resumes.
        ##################################################################
        {% if restore_fan > 0 %}
            RESPOND PREFIX="FAN" MSG="Restoring part cooling fan"
            M106 S{(restore_fan * 255)|int}
        {% else %}
            M107
        {% endif %}

        ##################################################################
        # Restore pause retract, if one was applied.
        ##################################################################
        {% set active_extruder = th.extruder|default("extruder") %}
        {% set has_extruder = active_extruder|length > 0 and active_extruder in printer %}
        {% set can_extrude = printer[active_extruder].can_extrude|string|lower == 'true' if has_extruder else false %}

        {% if pause_retracted == 1 and can_extrude %}
            RESPOND PREFIX="PRINT" MSG="Restoring pause retract"
            M83
            G1 E{pause_retract} F{pause_retract_feed}
        {% elif pause_retracted == 1 %}
            RESPOND PREFIX="PRINT" MSG="Pause retract restore skipped because the active extruder is not ready"
        {% endif %}

        ##################################################################
        # Hand position recovery back to Klipper's internal resume logic.
        ##################################################################
        RESUME_BASE

        ##################################################################
        # Clear saved KAT pause state after a successful resume.
        ##################################################################
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=0
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE=0.0
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE=0.0
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0

        RESPOND PREFIX="PRINT" MSG="Print resumed"
    {% endif %}


######################################################################
# CANCEL_PRINT
#
# Cancels the active print and clears KAT-managed pause state.
#
# Behavior:
# - Clears any active pause state
# - Resets the virtual SD file state
# - Reuses END_PRINT for normal shutdown and parking if available
# - Resets stored KAT pause variables
# - Hands control back to Klipper's original CANCEL_PRINT
######################################################################
[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
description: Cancel the active print and clear KAT state
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    # Inform the user that the print is being canceled.
    {% if kat.is_paused|default(0)|int == 1 %}
        RESPOND PREFIX="PRINT" MSG="Canceling paused print"
    {% else %}
        RESPOND PREFIX="PRINT" MSG="Canceling print"
    {% endif %}

    # Clear Klipper and KAT pause state first.
    CLEAR_PAUSE

    # Reset the active virtual SD print file state.
    SDCARD_RESET_FILE

    # Reuse the normal print shutdown and parking flow if available.
    {% if 'gcode_macro END_PRINT' in printer %}
        END_PRINT
    {% else %}
        RESPOND PREFIX="PRINT" MSG="END_PRINT not found, using basic cancel shutdown"
        TURN_OFF_HEATERS
        M107
    {% endif %}

    # Reset KAT-managed pause state.
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0

    RESPOND PREFIX="PRINT" MSG="Print canceled"

    # Hand control back to the original cancel macro last.
    CANCEL_PRINT_BASE


######################################################################
# CLEAR PAUSE
#
# Clears both Klipper's paused state and KAT's stored pause values.
# This is useful after an interrupted runout event or when manually
# aborting a paused print without using RESUME.
######################################################################
[gcode_macro CLEAR_PAUSE]
rename_existing: CLEAR_PAUSE_BASE
description: Clear paused state and reset stored KAT pause values
gcode:
    CLEAR_PAUSE_BASE
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0
    RESPOND PREFIX="PAUSE" MSG="Paused state cleared"


######################################################################
# SENSOR INTEGRATION NOTES
#
# Recommended sensor setup:
#
# [filament_switch_sensor filament_runout]
# pause_on_runout: False
# runout_gcode:
#     FILAMENT_RUNOUT
#
# [filament_motion_sensor filament_clog]
# pause_on_runout: False
# runout_gcode:
#     FILAMENT_CLOG
#
# Optional resume filament check:
#
# In [gcode_macro KAT], set:
# variable_resume_filament_sensor: '"filament_switch_sensor filament_runout"'
#
# If left empty, RESUME will not check for filament before continuing.
######################################################################
