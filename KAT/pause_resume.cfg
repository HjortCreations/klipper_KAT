######################################################################
# PAUSE / RESUME CONTROL
#
# This file centralizes all pause-related logic for KAT.
#
# Included macros:
# - _KAT_PAUSE       Internal shared pause handler
# - PAUSE            Manual pause entry point
# - FILAMENT_RUNOUT  Runout-triggered pause entry point
# - RESUME           Restore temperatures, fan state, and print motion
# - CLEAR_PAUSE      Clear pause state and reset stored KAT pause values
#
# Notes:
# - All user-adjustable values are expected to live in [gcode_macro KAT].
# - This file does not change idle timeout.
# - The built-in PAUSE / RESUME behavior is preserved via rename_existing.
######################################################################


######################################################################
# INTERNAL PAUSE HANDLER
#
# This macro performs the actual pause actions used by both manual pause
# and automatic filament runout pause.
######################################################################
[gcode_macro _KAT_PAUSE]
description: Internal shared pause handler for KAT
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set th = printer.toolhead %}
    {% set is_klipper_paused = printer.pause_resume.is_paused|int %}
    {% set park_x = kat.pause_park_x|float %}
    {% set park_y = kat.pause_park_y|float %}
    {% set requested_lift = kat.pause_z_lift|float %}
    {% set standby_temp = kat.pause_standby_temp|float %}
    {% set retract = kat.pause_retract|float %}
    {% set retract_feed = kat.pause_retract_feed|float %}
    {% set lift_feed = kat.pause_lift_feed|float %}
    {% set park_feed = kat.pause_park_feed|float %}
    {% set current_z = th.position.z|float %}
    {% set max_z = th.axis_maximum.z|float %}
    {% set z_margin = 0.2 %}
    {% set available_lift = (max_z - current_z - z_margin)|float %}
    {% set actual_lift = [requested_lift, available_lift]|min %}
    {% set hotend_target = printer.extruder.target|float %}
    {% set fan_speed = printer.fan.speed|float %}
    {% set can_lift = 'z' in th.homed_axes|string|lower %}
    {% set can_park = 'xy' in th.homed_axes|string|lower %}
    {% set can_retract = printer.extruder.can_extrude|lower == 'true' %}

    # Ignore repeated pause requests once Klipper is already paused.
    {% if is_klipper_paused == 1 %}
        RESPOND PREFIX="PAUSE" MSG="Pause request ignored because the printer is already paused"
    {% else %}
        # Save current restore state before any pause actions are applied.
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=1
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE={hotend_target}
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE={fan_speed}
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0

        # Hand control to Klipper's native pause handler first so the
        # internal resume position is captured before extra moves happen.
        PAUSE_BASE

        # Retract filament only when the hotend is currently allowed to extrude.
        {% if retract > 0 and can_retract %}
            M83
            G1 E-{retract} F{retract_feed}
            SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=1
        {% endif %}

        # Lift Z only when Z is homed and there is usable travel left.
        {% if can_lift and actual_lift > 0 %}
            G91
            G1 Z{actual_lift} F{lift_feed}
            G90
            SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE={actual_lift}
        {% endif %}

        # Park the toolhead only when both X and Y are homed.
        {% if can_park %}
            G90
            G0 X{park_x} Y{park_y} F{park_feed}
        {% endif %}

        # Turn off part cooling fan during pause.
        M107

        # Drop to standby temperature only when the current target is above standby.
        {% if standby_temp > 0 and hotend_target > standby_temp %}
            M104 S{standby_temp}
        {% endif %}

        RESPOND PREFIX="PAUSE" MSG="Print paused ({kat.pause_reason})"
    {% endif %}


######################################################################
# MANUAL PAUSE
#
# Sets the pause reason to "manual" and then calls the shared KAT pause
# handler.
######################################################################
[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
description: Pause the active print using KAT pause logic
gcode:
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
    _KAT_PAUSE


######################################################################
# SENSOR INTEGRATION NOTES
#
# Filament sensors should stay simple and only trigger the correct KAT
# macro. Do not place full pause logic inside the sensor sections.
#
# Recommended examples:
#
# [filament_switch_sensor filament_runout]
# pause_on_runout: False
# runout_gcode:
#     FILAMENT_RUNOUT
#
# [filament_switch_sensor filament_clog]
# pause_on_runout: False
# runout_gcode:
#     FILAMENT_CLOG
#
# The actual pause handling, state saving, console messages, and resume
# logic are all managed by pause_resume.cfg.
######################################################################


######################################################################
# FILAMENT RUNOUT
#
# Handles filament runout events from a filament switch sensor.
######################################################################
[gcode_macro FILAMENT_RUNOUT]
description: Handle filament runout events
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    # Ignore repeated triggers if the printer is already paused.
    {% if kat.is_paused|int == 1 %}
        RESPOND PREFIX="FILAMENT" MSG="Runout detected, but the printer is already paused"
    {% else %}
        # Store the reason for the pause so RESUME can react consistently.
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"runout"'

        # Inform the user what happened and what to do next.
        RESPOND PREFIX="FILAMENT" MSG="Filament runout detected - pausing print"
        RESPOND PREFIX="FILAMENT" MSG="Load new filament and resume when ready"

        _KAT_PAUSE
    {% endif %}


######################################################################
# FILAMENT CLOG
#
# Handles filament clog or jam events from a clog sensor.
######################################################################
[gcode_macro FILAMENT_CLOG]
description: Handle filament clog events
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    # Ignore repeated triggers if the printer is already paused.
    {% if kat.is_paused|int == 1 %}
        RESPOND PREFIX="FILAMENT" MSG="Clog detected, but the printer is already paused"
    {% else %}
        # Store the reason for the pause so RESUME can react consistently.
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"clog"'

        # Inform the user what happened and what to check.
        RESPOND PREFIX="FILAMENT" MSG="Filament clog detected - pausing print"
        RESPOND PREFIX="FILAMENT" MSG="Check nozzle, extruder, and filament path before resuming"

        _KAT_PAUSE
    {% endif %}


######################################################################
# RESUME
#
# Restores the print after a KAT-managed pause.
# - Restores hotend temperature before resuming motion
# - Restores part cooling fan speed
# - Returns the toolhead to the saved print position
# - Drops Z back down only if a pause lift was applied
# - Clears the stored pause state after resume
######################################################################
[gcode_macro RESUME]
rename_existing: RESUME_BASE
description: Resume the active print after a KAT-managed pause
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    # Saved state from the pause sequence.
    {% set restore_temp = kat.pause_restore_temp|float %}
    {% set restore_fan = kat.pause_restore_fan|float %}
    {% set pause_reason = kat.pause_reason %}
    {% set lift_applied = kat.pause_lift_applied|float %}
    {% set restore_feed = kat.pause_restore_feed|float %}

    # Prevent resume if the printer is not currently paused.
    {% if kat.is_paused|int == 0 %}
        RESPOND PREFIX="PRINT" MSG="Resume ignored because no KAT pause is active"
        RETURN
    {% endif %}

    # Tell the user why the print is being resumed.
    {% if pause_reason == '"runout"' %}
        RESPOND PREFIX="PRINT" MSG="Resuming print after filament runout"
    {% elif pause_reason == '"clog"' %}
        RESPOND PREFIX="PRINT" MSG="Resuming print after filament clog event"
    {% elif pause_reason == '"manual"' %}
        RESPOND PREFIX="PRINT" MSG="Resuming manually paused print"
    {% else %}
        RESPOND PREFIX="PRINT" MSG="Resuming print"
    {% endif %}

    # Restore the hotend target first and wait until it is ready.
    {% if restore_temp > 0 %}
        RESPOND PREFIX="TEMP" MSG="Restoring nozzle temperature to {restore_temp}C"
        M104 S{restore_temp}
        M109 S{restore_temp}
    {% endif %}

    # Restore the part cooling fan before motion resumes.
    {% if restore_fan > 0 %}
        RESPOND PREFIX="FAN" MSG="Restoring part cooling fan"
        M106 S{(restore_fan * 255)|int}
    {% else %}
        M107
    {% endif %}

    # Return to absolute positioning before giving control back to the base resume.
    G90

    # Restore the saved print position using Klipper's internal pause state.
    RESUME_BASE

    # If a Z lift was applied during pause, move back down by the same amount.
    {% if lift_applied > 0 %}
        G91
        G1 Z-{lift_applied} F{restore_feed}
        G90
    {% endif %}

    # Clear saved KAT pause state after a successful resume.
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0

    RESPOND PREFIX="PRINT" MSG="Print resumed"

######################################################################
# CLEAR PAUSE
#
# Clears both Klipper's paused state and KAT's stored pause values.
# This is useful after an interrupted runout event or when manually
# aborting a paused print without using RESUME.
######################################################################
[gcode_macro CLEAR_PAUSE]
rename_existing: CLEAR_PAUSE_BASE
description: Clear paused state and reset stored KAT pause values
gcode:
    CLEAR_PAUSE_BASE
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0
    RESPOND PREFIX="PAUSE" MSG="Paused state cleared"
