######################################################################
# FILTER HELPERS
#
# Smart helpers for printers using a chamber or air filter fan.
# Requires [fan_generic filter] only if a real filter fan is installed.
#
# Behavior:
# - If a fan named "filter" exists, the requested action is applied.
# - If no filter fan exists, the macro is skipped with a short message.
######################################################################

######################################################################
# FILTER_ON
#
# Turns the filter fan on if a filter fan is configured.
# Optional parameter:
# - SPEED: Fan speed from 0.0 to 1.0
######################################################################
[gcode_macro FILTER_ON]
description: Turn filter fan on if present
gcode:
    # Requested filter fan speed.
    {% set speed = params.SPEED|default(1.0)|float %}

    # Check whether a filter fan is configured.
    {% if 'fan_generic filter' in printer %}
        RESPOND PREFIX="FILTER" MSG="Turning filter on at speed {speed}"
        SET_FAN_SPEED FAN=filter SPEED={speed}
    {% else %}
        RESPOND PREFIX="FILTER" MSG="No filter present, skipping"
    {% endif %}


######################################################################
# FILTER_OFF
#
# Turns the filter fan off if a filter fan is configured.
######################################################################
[gcode_macro FILTER_OFF]
description: Turn filter fan off if present
gcode:
    # Check whether a filter fan is configured.
    {% if 'fan_generic filter' in printer %}
        RESPOND PREFIX="FILTER" MSG="Turning filter off"
        SET_FAN_SPEED FAN=filter SPEED=0.0
    {% else %}
        RESPOND PREFIX="FILTER" MSG="No filter present, skipping"
    {% endif %}


######################################################################
# EXHAUST HELPERS
