#####################################################################
# KAT – Core Klipper Features
# Base configuration for commonly used Klipper modules
# Safe defaults, clean structure, and well-commented behavior
#####################################################################


#####################################################################
# RESPOND
# Enables RESPOND command for structured console messages
# Useful for macros and debugging
#####################################################################

[respond]
default_type: command
# Options: echo, command, error
# "command" makes messages appear consistently in console output


#####################################################################
# PAUSE / RESUME SUPPORT
# Required for proper pause/resume handling in macros
#####################################################################

[pause_resume]
# No parameters needed, but required for M0 / PAUSE / RESUME to function


#####################################################################
# DISPLAY STATUS
# Allows M117 and status updates to UI (Mainsail/Fluidd)
#####################################################################

[display_status]


#####################################################################
# VIRTUAL SD CARD
# Enables file-based printing through Moonraker/Mainsail
#####################################################################

[virtual_sdcard]
path: ~/printer_data/gcodes
# Standard path for most Klipper installs (RatOS, MainsailOS, etc.)


#####################################################################
# FORCE MOVE
# Allows movement without homing (use with caution)
# Useful for service/debug macros
#####################################################################

[force_move]
enable_force_move: True


#####################################################################
# IDLE TIMEOUT
# Controls behavior when printer is idle
#####################################################################

[idle_timeout]
timeout: 1800

gcode:
    M117 Printer idle

    # Turn off heaters
    TURN_OFF_HEATERS

    # Turn off part cooling fan
    M107

    # Turn off generic fans if they exist
    {% if 'fan_generic chamber' in printer %}
        SET_FAN_SPEED FAN=chamber SPEED=0
    {% endif %}

    {% if 'fan_generic filter' in printer %}
        SET_FAN_SPEED FAN=filter SPEED=0
    {% endif %}

    {% if 'fan_generic aux' in printer %}
        SET_FAN_SPEED FAN=aux SPEED=0
    {% endif %}

    # Disable steppers
    M84


#####################################################################
# EXCLUDE OBJECT
# Enables object cancellation in supported slicers (e.g. PrusaSlicer)
#####################################################################

[exclude_object]


#####################################################################
# SKEW CORRECTION
# Enables skew correction calibration and compensation
#####################################################################

[skew_correction]
# Calibration must be performed before use
# Supports XY, XZ, YZ correction


#####################################################################
# GCODE ARCS
# Enables support for G2/G3 arc commands
#####################################################################

[gcode_arcs]
resolution: 0.1
# Lower = smoother arcs but more segments


#####################################################################
# NOTES
#
# This file is intended as a shared baseline across machines.
# Add hardware-specific configs in separate files.
#
# Keep this file clean and reusable.
#####################################################################
