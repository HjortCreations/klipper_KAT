######################################################################
# KAT – Klipper Automation Toolkit
#
# Main core entrypoint for KAT.
#
# Add this single line to printer.cfg:
# [include KAT/core_features.cfg]
#
# This file loads the core KAT macro suite in the required order.
# Hardware-specific configuration should stay in printer.cfg.
######################################################################

[include KAT/klipper_features.cfg]      # Common Klipper baseline modules used by KAT

[include KAT/variables.cfg]             # Shared KAT variables; must load before macros that read [gcode_macro KAT]
[include KAT/about.cfg]                 # KAT_ABOUT and startup banner

[include KAT/temperature_control.cfg]   # Smart M109/M140/M190 handling
[include KAT/kat_helpers.cfg]           # Shared movement, homing, park, and safety helpers
[include KAT/fan_control.cfg]           # Filter and exhaust helpers
[include KAT/prime.cfg]                 # Line/blob prime helpers

[include KAT/start_print.cfg]           # START_PRINT and start-print helper flow
[include KAT/end_print.cfg]             # END_PRINT flow
[include KAT/pause_resume.cfg]          # PAUSE, RESUME, CANCEL_PRINT and filament events

#[include KAT/advanced_features.cfg]    # Optional: requires gcode_shell_command
