#####################################################################
# KAT – Core Features / Main Include
#
# This is the main entrypoint for KAT.
#
# Add only this line to printer.cfg:
#
# [include KAT/core_features.cfg]
#
# This file enables common Klipper baseline modules and includes the
# rest of the KAT macro suite in the correct order.
#
# Important:
# KAT requires gcode_shell_command support because resonance graph
# tooling is included as a standard KAT feature.
#####################################################################


#####################################################################
# RESPOND
# Enables RESPOND command for structured console messages.
#####################################################################

[respond]
default_type: command
# Options: echo, command, error
# "command" makes messages appear consistently in console output


#####################################################################
# PAUSE / RESUME SUPPORT
# Required for proper pause/resume handling in macros.
#####################################################################

[pause_resume]
# No parameters needed, but required for PAUSE / RESUME to function


#####################################################################
# DISPLAY STATUS
# Allows M117 and status updates to UI.
#####################################################################

[display_status]


#####################################################################
# VIRTUAL SD CARD
# Enables file-based printing through Moonraker/Mainsail.
#####################################################################

[virtual_sdcard]
path: ~/printer_data/gcodes
# Standard path for most Klipper installs


#####################################################################
# FORCE MOVE
# Allows movement without homing.
# Used by service/debug macros such as SET_POSITION.
#####################################################################

[force_move]
enable_force_move: True


#####################################################################
# IDLE TIMEOUT
# Controls behavior when printer is idle.
#
# KAT start/end macros may change the active idle timeout during print
# workflows, but this is the default standby behavior.
#####################################################################

[idle_timeout]
timeout: 1800

gcode:
    M117 Printer idle

    # Turn off heaters.
    TURN_OFF_HEATERS

    # Turn off part cooling fan.
    M107

    # Turn off generic fans if they exist.
    {% if 'fan_generic chamber' in printer %}
        SET_FAN_SPEED FAN=chamber SPEED=0
    {% endif %}

    {% if 'fan_generic filter' in printer %}
        SET_FAN_SPEED FAN=filter SPEED=0
    {% endif %}

    {% if 'fan_generic exhaust' in printer %}
        SET_FAN_SPEED FAN=exhaust SPEED=0
    {% endif %}

    {% if 'fan_generic aux' in printer %}
        SET_FAN_SPEED FAN=aux SPEED=0
    {% endif %}

    # Disable steppers.
    M84


#####################################################################
# EXCLUDE OBJECT
# Enables object cancellation in supported slicers.
#####################################################################

[exclude_object]


#####################################################################
# SKEW CORRECTION
# Enables skew correction calibration and compensation.
#####################################################################

[skew_correction]
# Calibration must be performed before use.
# Supports XY, XZ, YZ correction.


#####################################################################
# GCODE ARCS
# Enables support for G2/G3 arc commands.
#####################################################################

[gcode_arcs]
resolution: 0.1
# Lower = smoother arcs but more segments.


#####################################################################
# KAT MACRO SUITE
#
# Include order matters.
#
# variables.cfg must be loaded before macros that read KAT variables.
# helpers.cfg should be loaded before macros that call movement helpers.
# pause_resume.cfg should be loaded after [pause_resume] exists.
# resonance_tools.cfg requires gcode_shell_command support.
#####################################################################

[include KAT/variables.cfg]
[include KAT/temperature_control.cfg]
[include KAT/helpers.cfg]
[include KAT/filter.cfg]
[include KAT/prime.cfg]
[include KAT/start_macro.cfg]
[include KAT/end_macro.cfg]
[include KAT/pause_resume.cfg]
[include KAT/resonance_tools.cfg]


#####################################################################
# NOTES
#
# This file is intended as the single KAT entrypoint.
#
# Machine-specific hardware should still live in printer.cfg or separate
# machine config files:
#
# - steppers
# - heaters
# - fans
# - probes
# - accelerometers
# - resonance_tester
# - bed_mesh
# - quad_gantry_level
# - z_tilt
# - homing_override
#
# KAT should define how the printer is operated.
# The printer config should define what the machine is.
#####################################################################
