######################################################################
# KAT OPTIONAL SHELL COMMANDS
#
# This file is optional.
#
# It requires gcode_shell_command support in Klipper.
# Do not include this file unless you have that extension installed.
#
# Example include:
# [include KAT/optional/shell_commands.cfg]
#
# Adjust command paths if your KAT repo is installed somewhere else.
######################################################################

[gcode_shell_command kat_generate_shaper_graph_x]
command: ~/printer_data/config/klipper_KAT/scripts/generate-shaper-graph-x.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_shaper_graph_y]
command: ~/printer_data/config/klipper_KAT/scripts/generate-shaper-graph-y.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_belt_tension_graph]
command: ~/printer_data/config/klipper_KAT/scripts/generate-belt-tension-graph.sh
timeout: 180.
verbose: True


######################################################################
# User-facing macros
######################################################################

[gcode_macro KAT_GENERATE_SHAPER_GRAPH_X]
description: Generate X input shaper graph from the newest resonance CSV
gcode:
    RUN_SHELL_COMMAND CMD=kat_generate_shaper_graph_x

[gcode_macro KAT_GENERATE_SHAPER_GRAPH_Y]
description: Generate Y input shaper graph from the newest resonance CSV
gcode:
    RUN_SHELL_COMMAND CMD=kat_generate_shaper_graph_y

[gcode_macro KAT_GENERATE_BELT_TENSION_GRAPH]
description: Generate belt tension graph from the newest upper/lower belt CSV files
gcode:
    RUN_SHELL_COMMAND CMD=kat_generate_belt_tension_graph
