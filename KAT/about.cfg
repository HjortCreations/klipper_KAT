######################################################################
# KAT ABOUT / STATUS
#
# Provides a small startup/status message and a manual KAT_ABOUT command.
######################################################################


######################################################################
# KAT_ABOUT
#
# Prints KAT version and project information to the console.
######################################################################

[gcode_macro KAT_ABOUT]
description: Show KAT version and project information
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    RESPOND PREFIX="KAT" MSG="KAT {kat.kat_version} active"
    RESPOND PREFIX="KAT" MSG="Klipper Automation Toolkit"
    RESPOND PREFIX="KAT" MSG="Developed, sponsored, and maintained by {kat.kat_sponsor}"
    RESPOND PREFIX="KAT" MSG="Repository: {kat.kat_repo_url}"


######################################################################
# KAT_SELFTEST
#
# Prints a quick configuration sanity report for first-time setup.
#
# Report includes:
# - Whether key helper macros exist: PARK_TOOLHEAD, SAFE_PAUSE_Z_HOP, END_PRINT
# - Active resume filament check mode
# - Number of detected filament_switch_sensor sections and how many are enabled
######################################################################
[gcode_macro KAT_SELFTEST]
description: Run a quick KAT configuration sanity check
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set resume_mode = kat.resume_filament_check_mode|default("strict")|string|lower %}
    {% set sensors = namespace(total=0, enabled=0) %}

    RESPOND PREFIX="SELFTEST" MSG="KAT config sanity check"

    {% if 'gcode_macro PARK_TOOLHEAD' in printer %}
        RESPOND PREFIX="SELFTEST" MSG="PARK_TOOLHEAD: OK"
    {% else %}
        RESPOND PREFIX="SELFTEST" MSG="PARK_TOOLHEAD: MISSING"
    {% endif %}

    {% if 'gcode_macro SAFE_PAUSE_Z_HOP' in printer %}
        RESPOND PREFIX="SELFTEST" MSG="SAFE_PAUSE_Z_HOP: OK"
    {% else %}
        RESPOND PREFIX="SELFTEST" MSG="SAFE_PAUSE_Z_HOP: MISSING"
    {% endif %}

    {% if 'gcode_macro END_PRINT' in printer %}
        RESPOND PREFIX="SELFTEST" MSG="END_PRINT: OK"
    {% else %}
        RESPOND PREFIX="SELFTEST" MSG="END_PRINT: MISSING"
    {% endif %}

    {% for section_name in printer.configfile.settings %}
        {% set section = section_name|string %}
        {% if section[:23] == "filament_switch_sensor " %}
            {% set sensors.total = sensors.total + 1 %}
            {% if section in printer and printer[section].enabled|string|lower == "true" %}
                {% set sensors.enabled = sensors.enabled + 1 %}
            {% endif %}
        {% endif %}
    {% endfor %}

    RESPOND PREFIX="SELFTEST" MSG="RESUME filament check mode: {resume_mode}"
    RESPOND PREFIX="SELFTEST" MSG="filament_switch_sensor found: {sensors.total}, enabled: {sensors.enabled}"


######################################################################
# KAT STARTUP BANNER
#
# Shows a short message shortly after Klipper is ready.
######################################################################

[delayed_gcode _KAT_STARTUP_BANNER]
initial_duration: 2.0
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    {% if kat.kat_startup_banner %}
        KAT_ABOUT
    {% endif %}
