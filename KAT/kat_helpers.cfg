######################################################################
# SET_POSITION
#
# Manually overrides the current kinematic position.
#
# Default behavior:
# - X defaults to machine center
# - Y defaults to machine center
# - Z defaults to 10 mm
#
# Notes:
# - This macro marks the printer as requiring a real home next time.
# - MAYBE_HOME will run a full G28 if this macro has been used.
######################################################################
[gcode_macro SET_POSITION]
description: Set kinematic position and mark that homing is required next time
gcode:
    {% set th = printer.toolhead %}
    {% set center_x = (th.axis_minimum.x|float + th.axis_maximum.x|float) / 2.0 %}
    {% set center_y = (th.axis_minimum.y|float + th.axis_maximum.y|float) / 2.0 %}
    {% set x = params.X|default(center_x)|float %}
    {% set y = params.Y|default(center_y)|float %}
    {% set z = params.Z|default(10.0)|float %}

    RESPOND PREFIX="POSITION" MSG="Manual position override requested"
    RESPOND PREFIX="POSITION" MSG="Setting X={x} Y={y} Z={z}"

    SET_KINEMATIC_POSITION X={x} Y={y} Z={z}

    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=set_position_used VALUE=1
    RESPOND PREFIX="POSITION" MSG="set_position_used flag set"'
    

######################################################################
# MAYBE_HOME
#
# Homes the printer only when needed.
#
# Behavior:
# - If SET_POSITION was used, run a full G28 and clear the flag
# - If the printer is not fully homed, run a full G28
# - Otherwise, skip homing
######################################################################
[gcode_macro MAYBE_HOME]
description: Run full G28 only when required
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set homed_axes = printer.toolhead.homed_axes|string|lower %}

    # Force a full home if SET_POSITION was used.
    {% if kat.set_position_used|int == 1 %}
        RESPOND PREFIX="HOME" MSG="Manual position override detected - running full G28"
        G28
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=set_position_used VALUE=0

    # Run a full home if the printer is not fully homed.
    {% elif homed_axes != "xyz" %}
        RESPOND PREFIX="HOME" MSG="Printer is not fully homed - running full G28"
        G28

    # Otherwise skip homing.
    {% else %}
        RESPOND PREFIX="HOME" MSG="Printer already fully homed - skipping G28"
    {% endif %}


######################################################################
# PARK_TOOLHEAD
#
# Moves the toolhead to a named park position.
#
# Supported positions:
# - front_center
# - back_center
# - near_zero
# - near_home
#
# Notes:
# - Uses KAT variable_park_margin as the edge tolerance.
# - Requires both X and Y to be homed before moving.
######################################################################
[gcode_macro PARK_TOOLHEAD]
description: Move the toolhead to a named park position
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set th = printer.toolhead %}
    {% set homed_axes = th.homed_axes|string|lower %}

    # Read requested named park position.
    {% set park_position = params.POSITION|default("back_center")|string|lower %}

    # Read configured park margin from KAT.
    {% set margin = kat.park_margin|float %}

    # Read machine boundaries.
    {% set min_x = th.axis_minimum.x|float %}
    {% set max_x = th.axis_maximum.x|float %}
    {% set min_y = th.axis_minimum.y|float %}
    {% set max_y = th.axis_maximum.y|float %}

    # Calculate machine center.
    {% set center_x = (min_x + max_x) / 2.0 %}

    # Do not move unless both X and Y are homed.
    {% if 'x' not in homed_axes or 'y' not in homed_axes %}
        RESPOND PREFIX="PARK" MSG="Cannot park toolhead because X and Y are not homed"
    {% else %}

        ##################################################################
        # back_center
        # Centered in X, close to the back edge in Y.
        ##################################################################
        {% if park_position == "back_center" %}
            {% set park_x = center_x %}
            {% set park_y = max_y - margin %}

        ##################################################################
        # front_center
        # Centered in X, close to the front edge in Y.
        ##################################################################
        {% elif park_position == "front_center" %}
            {% set park_x = center_x %}
            {% set park_y = min_y + margin %}

        ##################################################################
        # near_zero
        # Close to the machine minimum corner.
        ##################################################################
        {% elif park_position == "near_zero" %}
            {% set park_x = min_x + margin %}
            {% set park_y = min_y + margin %}

        ##################################################################
        # near_home
        # Close to the actual XY home corner based on endstop positions.
        ##################################################################
        {% elif park_position == "near_home" %}
            {% set x_endstop = printer.configfile.settings.stepper_x.position_endstop|float %}
            {% set y_endstop = printer.configfile.settings.stepper_y.position_endstop|float %}

            {% set x_dist_to_min = (x_endstop - min_x)|abs %}
            {% set x_dist_to_max = (max_x - x_endstop)|abs %}
            {% set y_dist_to_min = (y_endstop - min_y)|abs %}
            {% set y_dist_to_max = (max_y - y_endstop)|abs %}

            {% if x_dist_to_min <= x_dist_to_max %}
                {% set park_x = min_x + margin %}
            {% else %}
                {% set park_x = max_x - margin %}
            {% endif %}

            {% if y_dist_to_min <= y_dist_to_max %}
                {% set park_y = min_y + margin %}
            {% else %}
                {% set park_y = max_y - margin %}
            {% endif %}

        ##################################################################
        # Fallback
        # If an unknown name is used, fall back to back_center.
        ##################################################################
        {% else %}
            RESPOND PREFIX="PARK" MSG="Unknown park position '{park_position}', using back_center"
            {% set park_x = center_x %}
            {% set park_y = max_y - margin %}
        {% endif %}

        RESPOND PREFIX="PARK" MSG="Moving to {park_position}: X={park_x} Y={park_y}"
        G90
        G0 X{park_x} Y{park_y}
    {% endif %}
