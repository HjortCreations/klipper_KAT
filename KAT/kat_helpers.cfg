######################################################################
# SET_POSITION
#
# Manually overrides the current kinematic position.
#
# Default behavior:
# - X defaults to machine center
# - Y defaults to machine center
# - Z defaults to 10 mm
#
# Notes:
# - This macro marks the printer as requiring a real home next time.
# - MAYBE_HOME will run a full G28 if this macro has been used.
######################################################################
[gcode_macro SET_POSITION]
description: Set kinematic position and mark that homing is required next time
gcode:
    {% set th = printer.toolhead %}
    {% set center_x = (th.axis_minimum.x|float + th.axis_maximum.x|float) / 2.0 %}
    {% set center_y = (th.axis_minimum.y|float + th.axis_maximum.y|float) / 2.0 %}
    {% set x = params.X|default(center_x)|float %}
    {% set y = params.Y|default(center_y)|float %}
    {% set z = params.Z|default(10.0)|float %}

    RESPOND PREFIX="POSITION" MSG="Manual position override requested"
    RESPOND PREFIX="POSITION" MSG="Setting X={x} Y={y} Z={z}"

    SET_KINEMATIC_POSITION X={x} Y={y} Z={z}

    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=set_position_used VALUE=1
    RESPOND PREFIX="POSITION" MSG="set_position_used flag set"'
    

######################################################################
# MAYBE_HOME
#
# Homes the printer only when needed.
#
# Behavior:
# - If SET_POSITION was used, run a full G28 and clear the flag
# - If the printer is not fully homed, run a full G28
# - Otherwise, skip homing
######################################################################
[gcode_macro MAYBE_HOME]
description: Run full G28 only when required
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set homed_axes = printer.toolhead.homed_axes|string|lower %}

    # Force a full home if SET_POSITION was used.
    {% if kat.set_position_used|int == 1 %}
        RESPOND PREFIX="HOME" MSG="Manual position override detected - running full G28"
        G28
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=set_position_used VALUE=0

    # Run a full home if the printer is not fully homed.
    {% elif homed_axes != "xyz" %}
        RESPOND PREFIX="HOME" MSG="Printer is not fully homed - running full G28"
        G28

    # Otherwise skip homing.
    {% else %}
        RESPOND PREFIX="HOME" MSG="Printer already fully homed - skipping G28"
    {% endif %}


######################################################################
# PARK_TOOLHEAD
#
# Moves the toolhead to a named park position.
#
# Supported positions:
# - front_center
# - back_center
# - near_zero
# - near_home
#
# Speed handling:
# - XY speed is calculated from printer max_velocity
# - Z speed is calculated from printer max_z_velocity
# - Both are scaled by KAT speed factors
#
# Required KAT variables:
# - variable_park_margin
# - variable_park_speed_factor_xy
# - variable_park_speed_factor_z
#
# Optional parameter:
# - POSITION: Named park position (defaults to back_center)
######################################################################
[gcode_macro PARK_TOOLHEAD]
description: Move the toolhead to a named park position
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set th = printer.toolhead %}
    {% set homed_axes = th.homed_axes|string|lower %}
    {% set printer_cfg = printer.configfile.settings.printer %}

    # Requested park position name.
    {% set park_position = params.POSITION|default("back_center")|string|lower %}

    # User-configurable edge tolerance from KAT.
    {% set margin = kat.park_margin|float %}

    # Speed factors from KAT.
    {% set speed_factor_xy = kat.park_speed_factor_xy|float %}
    {% set speed_factor_z = kat.park_speed_factor_z|float %}

    # Machine limits.
    {% set min_x = th.axis_minimum.x|float %}
    {% set max_x = th.axis_maximum.x|float %}
    {% set min_y = th.axis_minimum.y|float %}
    {% set max_y = th.axis_maximum.y|float %}

    # Machine center.
    {% set center_x = (min_x + max_x) / 2.0 %}

    # Motion limits from [printer] in mm/s.
    {% set max_xy_velocity = printer_cfg.max_velocity|float %}
    {% set max_z_velocity = printer_cfg.max_z_velocity|default(max_xy_velocity)|float %}

    # Calculated park speeds in mm/s.
    {% set park_xy_speed = max_xy_velocity * speed_factor_xy %}
    {% set park_z_speed = max_z_velocity * speed_factor_z %}

    # Convert park speeds to mm/min for G-code feedrate.
    {% set park_xy_feed = park_xy_speed * 60.0 %}
    {% set park_z_feed = park_z_speed * 60.0 %}

    # Do not move unless both X and Y are homed.
    {% if 'x' not in homed_axes or 'y' not in homed_axes %}
        RESPOND PREFIX="PARK" MSG="Cannot park toolhead because X and Y are not homed"
    {% else %}

##################################################################
# back_center
# Centered in X, close to the back edge in Y.
##################################################################
        {% if park_position == "back_center" %}
            {% set park_x = center_x %}
            {% set park_y = max_y - margin %}

##################################################################
# front_center
# Centered in X, close to the front edge in Y.
##################################################################
        {% elif park_position == "front_center" %}
            {% set park_x = center_x %}
            {% set park_y = min_y + margin %}

##################################################################
# near_zero
# Close to the machine minimum corner.
##################################################################
        {% elif park_position == "near_zero" %}
            {% set park_x = min_x + margin %}
            {% set park_y = min_y + margin %}

##################################################################
# near_home
        # Close to the actual XY home corner based on endstop positions.
##################################################################
        {% elif park_position == "near_home" %}
            {% set x_endstop = printer.configfile.settings.stepper_x.position_endstop|float %}
            {% set y_endstop = printer.configfile.settings.stepper_y.position_endstop|float %}

            {% set x_dist_to_min = (x_endstop - min_x)|abs %}
            {% set x_dist_to_max = (max_x - x_endstop)|abs %}
            {% set y_dist_to_min = (y_endstop - min_y)|abs %}
            {% set y_dist_to_max = (max_y - y_endstop)|abs %}

            {% if x_dist_to_min <= x_dist_to_max %}
                {% set park_x = min_x + margin %}
            {% else %}
                {% set park_x = max_x - margin %}
            {% endif %}

            {% if y_dist_to_min <= y_dist_to_max %}
                {% set park_y = min_y + margin %}
            {% else %}
                {% set park_y = max_y - margin %}
            {% endif %}

##################################################################
# Fallback
# If an unknown name is used, fall back to back_center.
##################################################################
        {% else %}
            RESPOND PREFIX="PARK" MSG="Unknown park position '{park_position}', using back_center"
            {% set park_x = center_x %}
            {% set park_y = max_y - margin %}
        {% endif %}

        RESPOND PREFIX="PARK" MSG="Moving to {park_position}: X={park_x} Y={park_y} at F{park_xy_feed}"

        # Move in absolute coordinates using the calculated XY feedrate.
        G90
        G0 X{park_x} Y{park_y} F{park_xy_feed}
    {% endif %}


######################################################################
# SAFE_PAUSE_Z_HOP
#
# Performs a safe relative Z hop for pause handling.
#
# Behavior:
# - Uses KAT variable_pause_z_hop as the requested lift
# - Never moves above Z maximum minus the configured safety margin
# - Stores the actual applied lift in KAT.pause_lift_applied
# - Does nothing if Z is not homed or no safe lift is available
######################################################################
[gcode_macro SAFE_PAUSE_Z_HOP]
description: Perform a safe Z hop for pause handling
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set th = printer.toolhead %}
    {% set homed_axes = th.homed_axes|string|lower %}

    # Requested pause Z hop and shared edge safety margin.
    {% set requested_lift = kat.pause_z_hop|float %}
    {% set margin = kat.park_margin|float %}

    # Current Z position and machine Z limit.
    {% set current_z = th.position.z|float %}
    {% set max_z = th.axis_maximum.z|float %}

    # Motion limit from [printer] in mm/s, converted to mm/min.
    {% set printer_cfg = printer.configfile.settings.printer %}
    {% set max_z_velocity = printer_cfg.max_z_velocity|default(printer_cfg.max_velocity)|float %}
    {% set z_speed_factor = kat.park_speed_factor_z|float %}
    {% set z_feed = max_z_velocity * z_speed_factor * 60.0 %}

    # Calculate how much safe upward travel remains.
    {% set available_lift = [max_z - current_z - margin, 0.0]|max %}
    {% set actual_lift = [requested_lift, available_lift]|min %}

    # Reset stored applied lift before evaluating the move.
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0

    # Only move if Z is homed and a safe lift is available.
    {% if 'z' not in homed_axes %}
        RESPOND PREFIX="Z" MSG="Pause Z hop skipped because Z is not homed"
    {% elif actual_lift <= 0 %}
        RESPOND PREFIX="Z" MSG="Pause Z hop skipped because no safe upward travel remains"
    {% else %}
        RESPOND PREFIX="Z" MSG="Applying safe pause Z hop of {actual_lift}mm"
        G91
        G1 Z{actual_lift} F{z_feed}
        G90
        SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE={actual_lift}
    {% endif %}


######################################################################
# MOVE_END_PRINT_Z
#
# Moves Z to a safe END_PRINT height.
#
# Behavior:
# - Targets the midpoint of total Z travel
# - But never targets lower than KAT variable_end_print_min_z
# - Never targets higher than Z maximum minus the configured safety margin
# - Never moves downward during END_PRINT
# - Does nothing if Z is not homed
######################################################################
[gcode_macro MOVE_END_PRINT_Z]
description: Move Z to a safe END_PRINT height
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set th = printer.toolhead %}
    {% set homed_axes = th.homed_axes|string|lower %}

    # Use shared edge safety margin and configured minimum END_PRINT Z.
    {% set margin = kat.park_margin|float %}
    {% set min_end_z = kat.end_print_min_z|float %}

    # Current position and machine Z limit.
    {% set current_z = th.position.z|float %}
    {% set max_z = th.axis_maximum.z|float %}

    # Motion limit from [printer] in mm/s, converted to mm/min.
    {% set printer_cfg = printer.configfile.settings.printer %}
    {% set max_z_velocity = printer_cfg.max_z_velocity|default(printer_cfg.max_velocity)|float %}
    {% set z_speed_factor = kat.park_speed_factor_z|float %}
    {% set z_feed = max_z_velocity * z_speed_factor * 60.0 %}

    # Calculate midpoint of total Z travel.
    {% set mid_z = max_z / 2.0 %}

    # Use the higher of midpoint or configured minimum.
    {% set desired_z = [mid_z, min_end_z]|max %}

    # Never target above the safe upper Z limit.
    {% set safe_target_z = [desired_z, max_z - margin]|min %}

    # Never move downward during END_PRINT.
    {% set final_target_z = [current_z, safe_target_z]|max %}

    # Only move if Z is homed and the target is above the current position.
    {% if 'z' not in homed_axes %}
        RESPOND PREFIX="Z" MSG="END_PRINT Z move skipped because Z is not homed"
    {% elif final_target_z <= current_z %}
        RESPOND PREFIX="Z" MSG="END_PRINT Z move skipped because Z is already high enough"
    {% else %}
        RESPOND PREFIX="Z" MSG="Moving Z to safe END_PRINT height: Z={final_target_z}"
        G90
        G0 Z{final_target_z} F{z_feed}
    {% endif %}
