######################################################################
# KAT SHARED VARIABLES
#
# This macro stores all user-adjustable values for the KAT macro suite.
# Keep all common settings here so they are easy to find and tune.
# This macro does not execute any gcode by itself.
######################################################################
[gcode_macro KAT]
description: Shared variables for KAT macros


######################################################################
# KAT identity
######################################################################
variable_kat_version: '"0.4.0-dev"'                    # Current KAT version
variable_kat_repo_url: '"https://github.com/HjortCreations/klipper_KAT"'
variable_kat_sponsor: '"Hjort Creations"'
variable_kat_startup_banner: True                      # Show KAT startup message in console


######################################################################
# Start print
######################################################################
variable_default_material: '"PLA"'          # Default material if slicer does not send MATERIAL
variable_current_material: '"UNKNOWN"'      # Current normalized material name from slicer
variable_start_preheat_temp: 150.0          # Nozzle preheat temperature before homing, leveling, and probing
variable_start_preheat_minutes: 0.0         # Optional heat soak time after bed reaches target, in minutes
variable_start_z_home_temp: 150.0           # Nozzle temperature used before final Z home after QGL/Z_TILT
variable_start_wipe_before_z_home: False    # Run nozzle wipe before final Z home after QGL/Z_TILT
variable_start_use_gantry_level: 1          # Run QGL or Z_TILT_ADJUST during START_PRINT if available
variable_start_use_bed_mesh: 1              # Run bed mesh during START_PRINT if available
variable_start_use_adaptive_mesh: 1         # Use adaptive bed mesh when bed_mesh is available
variable_adaptive_margin: 5.0               # Adaptive bed mesh margin
variable_start_use_prime: 1                 # Run prime/wipe sequence if available

######################################################################
# Last print values
######################################################################
variable_last_extruder_temp: 0.0            # Last requested first-layer nozzle temperature
variable_last_extruder_temp_other: 0.0      # Last requested other-layer nozzle temperature
variable_last_bed_temp: 0.0                 # Last requested bed temperature

######################################################################
# Temperature control
######################################################################
variable_hotend_wait_min_offset: 2.0      # Allowed undershoot before M109 continues
variable_hotend_wait_max_offset: 5.0      # Allowed overshoot before M109 continues
variable_hotend_wait_prefix: '"HOTEND"'   # Console prefix used for hotend wait messages
variable_bed_wait_prefix: '"BED"'         # Console prefix used for bed-related messages

######################################################################
# Pause / resume
######################################################################
variable_pause_park_position: '"front_center"' # Named park position used during pause
variable_pause_standby_temp: 150.0             # Standby nozzle temperature during pause
variable_pause_retract: 2.0                    # Retract distance used when pausing
variable_pause_retract_feed: 1800.0            # Feedrate used for pause retract and restore

######################################################################
# Pause / resume state
#
# Internal state values used by pause_resume.cfg.
# These are reset automatically by START_PRINT, RESUME, CANCEL_PRINT,
# and CLEAR_PAUSE.
######################################################################
variable_is_paused: 0                          # Tracks whether KAT pause logic is active
variable_pause_reason: '"manual"'              # Current pause reason: manual, runout, clog, or future states
variable_pause_restore_temp: 0.0               # Saved hotend target temperature restored during RESUME
variable_pause_restore_fan: 0.0                # Saved part cooling fan speed restored during RESUME
variable_pause_retracted: 0                    # Tracks whether a pause retract was applied
variable_pause_lift_applied: 0.0               # Stores the actual Z lift applied during pause
variable_set_position_used: 0                # Internal flag set by SET_POSITION; forces MAYBE_HOME to run G28

######################################################################
# Park positions and speed
######################################################################
variable_park_margin: 1.0                 # Margin from axis limits for named park positions
variable_park_speed_factor_xy: 0.50       # XY park speed as a fraction of printer max_velocity
variable_park_speed_factor_z: 0.50        # Z park speed as a fraction of printer max_z_velocity
variable_pause_z_hop: 2.0                 # Requested Z hop during pause

######################################################################
# Print end behavior
######################################################################
variable_end_print_park_position: '"front_center"' # Named park position used at end of print
variable_end_print_min_z: 20.0                     # Minimum target Z for END_PRINT
variable_end_print_retract: 2.0                    # Retract distance used at end of print
variable_end_print_retract_feed: 1800.0            # Feedrate used for end print retract

######################################################################
# Idle timeout
######################################################################
variable_idle_timeout_standby: 1800               # Idle timeout used when the printer is idle
variable_idle_timeout_working: 43200              # Idle timeout used during active print jobs

######################################################################
# Prime behavior
######################################################################
variable_prime_type: '"line"'                    # Default prime type: "line" or "blob"
variable_prime_verbose: 1                        # Show prime messages in console (1=yes, 0=no)
variable_prime_smart_park_enable: 1              # Move close to prime position before priming (1=yes, 0=no)
variable_prime_location: '"auto"'                # auto, near_y_min, near_y_max, near_x_min, near_x_max
variable_prime_margin: 10.0                      # Distance from printed object when placing adaptive prime
variable_prime_park_z: 10.0                      # Z height used when smart parking before prime
variable_prime_wipe_move: 10.0                   # Small travel move after prime to help break the string
variable_prime_tip_distance: 0.0                 # Optional filament push before prime, useful after larger retracts
variable_prime_retract_length: 0.5               # Fallback retract if firmware retraction is not configured
variable_prime_retract_speed: 2100               # Fallback retract speed in mm/min

######################################################################
# Line prime
######################################################################
variable_line_prime_height: 0.8            # Z height during line prime
variable_line_prime_length: 40.0           # XY length of the prime line
variable_line_prime_amount: 35.0           # Filament length extruded during the line prime
variable_line_prime_feedrate: 720          # Extrusion feedrate for line prime in mm/min

######################################################################
# Blob prime
######################################################################
variable_blob_prime_x: 5.0                 # Preferred X position for blob prime
variable_blob_prime_y: 5.0                 # Preferred Y position for blob prime
variable_blob_prime_direction: '"y+"'      # Wipe direction after blob: y+, y-, x+, x-
variable_blob_prime_start_height: 0.5      # Z height where the blob is created
variable_blob_prime_lift_height: 5.0       # Z height after lifting out of the blob
variable_blob_prime_amount: 20.0           # Main blob extrusion amount
variable_blob_prime_lift_amount: 5.0       # Extra extrusion while lifting from the blob
variable_blob_prime_wipe_amount: 1.0       # Extra extrusion while wiping away from the blob
variable_blob_prime_wipe_length: 50.0      # Wipe move length after blob
variable_blob_prime_breakaway_length: 100.0 # Final move length to break away from wipe
variable_blob_prime_fan_speed: 50          # Part cooling fan speed during blob, 0-255
variable_blob_prime_blob_feedrate: 60      # Feedrate while creating the blob
variable_blob_prime_lift_feedrate: 100     # Feedrate while lifting out of blob
variable_blob_prime_wipe_feedrate: 200     # Feedrate while wiping from blob

gcode:
