######################################################################
# KAT SHARED VARIABLES
#
# This macro stores all user-adjustable values for the KAT macro suite.
# Keep all common settings here so they are easy to find and tune.
# This macro does not execute any gcode by itself.
######################################################################
[gcode_macro KAT]
description: Shared variables for KAT macros

######################################################################
# Temperature control
######################################################################
variable_hotend_wait_min_offset: 2.0      # Allowed undershoot before M109 continues
variable_hotend_wait_max_offset: 5.0      # Allowed overshoot before M109 continues
variable_hotend_wait_prefix: '"HOTEND"'   # Console prefix used for hotend wait messages
variable_bed_wait_prefix: '"BED"'         # Console prefix used for bed-related messages

######################################################################
# Pause / resume
######################################################################
variable_pause_park_x: 10.0               # X park position used during pause
variable_pause_park_y: 10.0               # Y park position used during pause
variable_pause_z_lift: 10.0               # Z lift applied when pausing
variable_pause_standby_temp: 150.0        # Standby nozzle temperature during pause
variable_pause_restore_fan: 1             # Restore part cooling fan on resume (1=yes, 0=no)

######################################################################
# Print end behavior
######################################################################
variable_end_retract: 2.0                 # Final retract distance at end of print
variable_end_drop_z: 5.0                  # Z move after print ends
variable_end_fan_speed: 255               # Part cooling fan speed used during print end cleanup

######################################################################
# Idle timeout
######################################################################
variable_idle_timeout_standby: 1800        # Default idle timeout in seconds
variable_idle_timeout_working: 43200       # Idle timeout while paused in seconds

gcode:
