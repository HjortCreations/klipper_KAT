

######################################################################
# KAT_LEVEL_GANTRY
#
# Runs the available gantry/bed leveling system.
#
# Behavior:
# - Uses QUAD_GANTRY_LEVEL if [quad_gantry_level] exists
# - Otherwise uses Z_TILT_ADJUST if [z_tilt] exists
# - Otherwise skips leveling with a console message
######################################################################
[gcode_macro KAT_LEVEL_GANTRY]
description: Run QGL or Z_TILT_ADJUST if available
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    {% if kat.start_use_gantry_level|int == 0 %}
        RESPOND PREFIX="LEVEL" MSG="Gantry leveling disabled, skipping"

    {% elif 'quad_gantry_level' in printer %}
        RESPOND PREFIX="LEVEL" MSG="Running QUAD_GANTRY_LEVEL"
        QUAD_GANTRY_LEVEL

    {% elif 'z_tilt' in printer %}
        RESPOND PREFIX="LEVEL" MSG="Running Z_TILT_ADJUST"
        Z_TILT_ADJUST

    {% else %}
        RESPOND PREFIX="LEVEL" MSG="No QGL or Z_TILT configured, skipping"
    {% endif %}

######################################################################
# KAT_HOME_Z_AFTER_LEVEL
#
# Re-homes Z after gantry leveling.
#
# Behavior:
# - If Beacon is configured, use Beacon contact homing
# - Otherwise use normal G28 Z
#
# Notes:
# - This is separated from START_PRINT so different probe behavior can
#   be handled in one place.
######################################################################
[gcode_macro KAT_HOME_Z_AFTER_LEVEL]
description: Re-home Z after gantry leveling
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    {% if kat.start_rehome_z|int == 0 %}
        RESPOND PREFIX="HOME" MSG="Z re-home after leveling disabled, skipping"

    {% elif 'beacon' in printer %}
        {% set contact_temp = kat.start_beacon_contact_temp|float %}
        RESPOND PREFIX="HOME" MSG="Beacon detected - preparing contact Z home"
        M109 S{contact_temp}
        G28 Z METHOD=CONTACT CALIBRATE=1

    {% else %}
        RESPOND PREFIX="HOME" MSG="Running normal G28 Z after leveling"
        G28 Z
    {% endif %}

######################################################################
# KAT_BED_MESH
#
# Runs bed mesh calibration if [bed_mesh] is configured.
#
# Behavior:
# - Skips if bed mesh is disabled in KAT
# - Skips if [bed_mesh] is not configured
# - Uses Beacon scan mesh if Beacon is configured
# - Otherwise uses normal adaptive bed mesh
######################################################################
[gcode_macro KAT_BED_MESH]
description: Run adaptive bed mesh if available
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set adaptive_margin = kat.adaptive_margin|float %}

    {% if kat.start_use_bed_mesh|int == 0 %}
        RESPOND PREFIX="MESH" MSG="Bed mesh disabled, skipping"

    {% elif 'bed_mesh' not in printer %}
        RESPOND PREFIX="MESH" MSG="No bed_mesh configured, skipping"

    {% else %}
        BED_MESH_CLEAR

        {% if kat.start_use_adaptive_mesh|int == 1 %}
            {% if 'beacon' in printer %}
                RESPOND PREFIX="MESH" MSG="Running Beacon adaptive scan mesh"
                BED_MESH_CALIBRATE METHOD=scan ADAPTIVE=1 ADAPTIVE_MARGIN={adaptive_margin}
            {% else %}
                RESPOND PREFIX="MESH" MSG="Running adaptive bed mesh"
                BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN={adaptive_margin}
            {% endif %}
        {% else %}
            {% if 'beacon' in printer %}
                RESPOND PREFIX="MESH" MSG="Running Beacon full scan mesh"
                BED_MESH_CALIBRATE METHOD=scan
            {% else %}
                RESPOND PREFIX="MESH" MSG="Running full bed mesh"
                BED_MESH_CALIBRATE
            {% endif %}
        {% endif %}
    {% endif %}

######################################################################
# KAT_PRIME
#
# Runs prime/wipe sequence if configured.
#
# Behavior:
# - Moves to prime position if MOVE_TO_PRIME_POS exists
# - Runs PRIME_LINE if PRIME_LINE exists
# - Skips missing parts with console messages
######################################################################
[gcode_macro KAT_PRIME]
description: Run prime/wipe sequence if available
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    {% if kat.start_use_prime|int == 0 %}
        RESPOND PREFIX="PRIME" MSG="Prime sequence disabled, skipping"

    {% else %}
        {% if 'gcode_macro MOVE_TO_PRIME_POS' in printer %}
            MOVE_TO_PRIME_POS
        {% else %}
            RESPOND PREFIX="PRIME" MSG="MOVE_TO_PRIME_POS not found, skipping move"
        {% endif %}

        {% if 'gcode_macro PRIME_LINE' in printer %}
            PRIME_LINE
        {% else %}
            RESPOND PREFIX="PRIME" MSG="PRIME_LINE not found, skipping prime"
        {% endif %}
    {% endif %}

