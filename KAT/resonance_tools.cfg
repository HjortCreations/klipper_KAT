######################################################################
# KAT RESONANCE TOOLS
#
# Standard KAT tooling for generating input shaper and belt tension
# graphs from Klipper resonance CSV files.
#
# Requirements:
# - gcode_shell_command support must be installed and enabled.
# - Klipper's scripts/calibrate_shaper.py must exist.
# - Klipper's scripts/graph_accelerometer.py must exist.
#
# Expected repository location:
# ~/printer_data/config/klipper_KAT/
#
# Expected output location:
# ~/printer_data/config/input_shaper/
#
# The shell commands use "bash <script>" so the scripts do not strictly
# need executable permissions, but running chmod +x KAT/scripts/*.sh is
# still recommended.
######################################################################


######################################################################
# Shell commands
######################################################################

[gcode_shell_command kat_generate_shaper_graph_x]
command: bash ~/printer_data/config/klipper_KAT/KAT/scripts/generate-shaper-graph-x.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_shaper_graph_y]
command: bash ~/printer_data/config/klipper_KAT/KAT/scripts/generate-shaper-graph-y.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_belt_tension_graph]
command: bash ~/printer_data/config/klipper_KAT/KAT/scripts/generate-belt-tension-graph.sh
timeout: 180.
verbose: True


######################################################################
# User-facing macros
######################################################################

[gcode_macro KAT_GENERATE_SHAPER_GRAPH_X]
description: Generate X input shaper graph from the newest resonance CSV
gcode:
    RESPOND PREFIX="KAT" MSG="Generating X input shaper graph"
    RUN_SHELL_COMMAND CMD=kat_generate_shaper_graph_x

[gcode_macro KAT_GENERATE_SHAPER_GRAPH_Y]
description: Generate Y input shaper graph from the newest resonance CSV
gcode:
    RESPOND PREFIX="KAT" MSG="Generating Y input shaper graph"
    RUN_SHELL_COMMAND CMD=kat_generate_shaper_graph_y

[gcode_macro KAT_GENERATE_BELT_TENSION_GRAPH]
description: Generate belt tension graph from the newest upper/lower belt CSV files
gcode:
    RESPOND PREFIX="KAT" MSG="Generating belt tension graph"
    RUN_SHELL_COMMAND CMD=kat_generate_belt_tension_graph
