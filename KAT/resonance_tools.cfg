######################################################################
# KAT RESONANCE TOOLS
#
# Standard KAT tooling for generating input shaper, resonance, and
# belt tension graphs from Klipper resonance CSV files.
#
# Requirements:
# - gcode_shell_command support must be installed and enabled.
# - Klipper's scripts/calibrate_shaper.py must exist.
# - Klipper's scripts/graph_accelerometer.py must exist.
#
# Expected repository location:
# ~/printer_data/config/klipper_KAT/
#
# Expected output location:
# ~/printer_data/config/input_shaper/
#
# Notes:
# - X/Y input shaper graphs use Klipper's calibrate_shaper.py.
# - Z resonance graph uses Klipper's graph_accelerometer.py.
# - Belt tension graph uses Klipper's graph_accelerometer.py.
# - TEST_RESONANCES AXIS=Z must be supported by the installed firmware.
######################################################################


######################################################################
# Shell commands
######################################################################

[gcode_shell_command kat_generate_shaper_graph_x]
command: bash ~/printer_data/config/klipper_KAT/KAT/scripts/generate-shaper-graph-x.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_shaper_graph_y]
command: bash ~/printer_data/config/klipper_KAT/KAT/scripts/generate-shaper-graph-y.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_resonance_graph_z]
command: bash ~/printer_data/config/klipper_KAT/KAT/scripts/generate-resonance-graph-z.sh
timeout: 120.
verbose: True

[gcode_shell_command kat_generate_belt_tension_graph]
command: bash ~/printer_data/config/klipper_KAT/KAT/scripts/generate-belt-tension-graph.sh
timeout: 180.
verbose: True


######################################################################
# Full resonance test workflows
#
# These macros run TEST_RESONANCES first and then generate the graph.
######################################################################

[gcode_macro KAT_TEST_RESONANCES_X]
description: Run TEST_RESONANCES AXIS=X and generate the X input shaper graph
gcode:
    RESPOND PREFIX="KAT" MSG="Running TEST_RESONANCES AXIS=X"
    TEST_RESONANCES AXIS=X
    RESPOND PREFIX="KAT" MSG="Generating X input shaper graph"
    RUN_SHELL_COMMAND CMD=kat_generate_shaper_graph_x

[gcode_macro KAT_TEST_RESONANCES_Y]
description: Run TEST_RESONANCES AXIS=Y and generate the Y input shaper graph
gcode:
    RESPOND PREFIX="KAT" MSG="Running TEST_RESONANCES AXIS=Y"
    TEST_RESONANCES AXIS=Y
    RESPOND PREFIX="KAT" MSG="Generating Y input shaper graph"
    RUN_SHELL_COMMAND CMD=kat_generate_shaper_graph_y

[gcode_macro KAT_TEST_RESONANCES_Z]
description: Run TEST_RESONANCES AXIS=Z and generate the Z resonance graph
gcode:
    RESPOND PREFIX="KAT" MSG="Running TEST_RESONANCES AXIS=Z"
    TEST_RESONANCES AXIS=Z
    RESPOND PREFIX="KAT" MSG="Generating Z resonance graph"
    RUN_SHELL_COMMAND CMD=kat_generate_resonance_graph_z
