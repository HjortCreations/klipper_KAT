######################################################################
# START_PRINT
#
# Generic KAT start print macro.
#
# Main behavior:
# - Reads slicer temperatures and material
# - Stores the normalized material name once in KAT.current_material
# - Uses the same material name for MPC and air handling
# - Heats the bed early and waits before homing/leveling/meshing
# - Supports optional heat soak in minutes
# - Uses helper macros for homing, leveling, Z-home, mesh, and prime
######################################################################
[gcode_macro START_PRINT]
description: Generic KAT START_PRINT
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    ##################################################################
    # Read slicer parameters
    ##################################################################
    {% set extruder_temp = params.EXTRUDER_TEMP|default(220)|float %}
    {% set extruder_temp_other = params.EXTRUDER_TEMP_OTHER|default(extruder_temp)|float %}
    {% set bed_temp = params.BED_TEMP|default(60)|float %}

    # Normalize material once and use this same value everywhere.
    {% set material = params.MATERIAL|default(kat.default_material|default("PLA"))|string|upper %}

    # Optional heat soak time in minutes.
    # Can be overridden from slicer using PREHEAT_MINUTES=10.
    {% set preheat_minutes = params.PREHEAT_MINUTES|default(kat.start_preheat_minutes)|float %}
    {% set preheat_ms = (preheat_minutes * 60000)|int %}

    ##################################################################
    # Store print state
    ##################################################################
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=last_extruder_temp VALUE={extruder_temp}
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=last_extruder_temp_other VALUE={extruder_temp_other}
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=last_bed_temp VALUE={bed_temp}
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=current_material VALUE='"{material}"'

    ##################################################################
    # Reset pause state
    ##################################################################
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0

    ##################################################################
    # Start print setup
    ##################################################################
    RESPOND PREFIX="PRINT" MSG="START_PRINT begin"
    RESPOND PREFIX="PRINT" MSG="Material={material}, nozzle={extruder_temp}C, bed={bed_temp}C"

    # Clear any old pause state and set normal movement modes.
    CLEAR_PAUSE
    G90
    M83

    # Use working idle timeout during active print jobs.
    SET_IDLE_TIMEOUT TIMEOUT={kat.idle_timeout_working}

    ##################################################################
    # Air handling
    ##################################################################

    # Start filter early to help circulate warm air inside the printer.
    {% if 'gcode_macro FILTER_ON' in printer %}
        FILTER_ON
    {% else %}
        RESPOND PREFIX="FILTER" MSG="FILTER_ON not found, skipping"
    {% endif %}

    # Enable exhaust for PLA only.
    # Other materials keep exhaust off by default to avoid losing chamber heat.
    {% if material == "PLA" %}
        RESPOND PREFIX="EXHAUST" MSG="PLA detected - enabling exhaust fan"
        {% if 'gcode_macro EXHAUST_ON' in printer %}
            EXHAUST_ON
        {% else %}
            RESPOND PREFIX="EXHAUST" MSG="EXHAUST_ON not found, skipping"
        {% endif %}
    {% else %}
        RESPOND PREFIX="EXHAUST" MSG="Material is {material} - exhaust fan not enabled"
        {% if 'gcode_macro EXHAUST_OFF' in printer %}
            EXHAUST_OFF
        {% endif %}
    {% endif %}

    ##################################################################
    # Bed heat first
    #
    # The bed must be at target temperature before homing, leveling,
    # probing, and meshing continue.
    ##################################################################
    RESPOND PREFIX="BED" MSG="Heating bed to {bed_temp}C before print preparation"
    M190 S{bed_temp}

    ##################################################################
    # Optional heat soak
    #
    # This waits after the bed has reached target temperature.
    # Useful for large beds, enclosed printers, ASA/ABS, or machines
    # where thermal expansion affects leveling and mesh accuracy.
    ##################################################################
    {% if preheat_minutes > 0 %}
        RESPOND PREFIX="HEATSOAK" MSG="Heat soaking for {preheat_minutes} minutes"
        G4 P{preheat_ms}
        RESPOND PREFIX="HEATSOAK" MSG="Heat soak complete"
    {% else %}
        RESPOND PREFIX="HEATSOAK" MSG="No heat soak requested, continuing"
    {% endif %}

    ##################################################################
    # Material setup
    ##################################################################

    # Apply material-specific MPC settings if the MPC helper exists.
    # Uses the same normalized material name stored in KAT.current_material.
    {% if 'gcode_macro _SET_MPC_MATERIAL' in printer %}
        _SET_MPC_MATERIAL MATERIAL={material}
    {% else %}
        RESPOND PREFIX="MPC" MSG="_SET_MPC_MATERIAL not found, skipping"
    {% endif %}

    ##################################################################
    # Nozzle preheat
    #
    # Preheat nozzle before homing, leveling, and probing.
    # The final print temperature is applied later, just before prime.
    ##################################################################
    M104 S{kat.start_preheat_temp}

    ##################################################################
    # Motion preparation
    ##################################################################

    # Home only when required.
    MAYBE_HOME

    # Run QUAD_GANTRY_LEVEL, Z_TILT_ADJUST, or skip if neither exists.
    KAT_LEVEL_GANTRY

    # Re-home Z using probe-specific logic.
    KAT_HOME_Z_AFTER_LEVEL

    # Run adaptive or full bed mesh if available.
    KAT_BED_MESH

    ##################################################################
    # Final heat and prime
    ##################################################################

    # Heat to first layer temperature and wait.
    RESPOND PREFIX="TEMP" MSG="Heating nozzle to first layer temperature: {extruder_temp}C"
    M109 S{extruder_temp}

    # Prime and wipe if available.
    KAT_PRIME

    RESPOND PREFIX="PRINT" MSG="START_PRINT complete - printing"



######################################################################
# KAT_LEVEL_GANTRY
#
# Runs the available gantry/bed leveling system.
#
# Behavior:
# - Uses QUAD_GANTRY_LEVEL if [quad_gantry_level] exists
# - Otherwise uses Z_TILT_ADJUST if [z_tilt] exists
# - Otherwise skips leveling with a console message
######################################################################
[gcode_macro KAT_LEVEL_GANTRY]
description: Run QGL or Z_TILT_ADJUST if available
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    {% if kat.start_use_gantry_level|int == 0 %}
        RESPOND PREFIX="LEVEL" MSG="Gantry leveling disabled, skipping"

    {% elif 'quad_gantry_level' in printer %}
        RESPOND PREFIX="LEVEL" MSG="Running QUAD_GANTRY_LEVEL"
        QUAD_GANTRY_LEVEL

    {% elif 'z_tilt' in printer %}
        RESPOND PREFIX="LEVEL" MSG="Running Z_TILT_ADJUST"
        Z_TILT_ADJUST

    {% else %}
        RESPOND PREFIX="LEVEL" MSG="No QGL or Z_TILT configured, skipping"
    {% endif %}

######################################################################
# KAT_HOME_Z_AFTER_LEVEL
#
# Re-homes Z after gantry leveling.
#
# Behavior:
# - If Beacon is configured, use Beacon contact homing
# - Otherwise use normal G28 Z
#
# Notes:
# - This is separated from START_PRINT so different probe behavior can
#   be handled in one place.
######################################################################
[gcode_macro KAT_HOME_Z_AFTER_LEVEL]
description: Re-home Z after gantry leveling
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    {% if kat.start_rehome_z|int == 0 %}
        RESPOND PREFIX="HOME" MSG="Z re-home after leveling disabled, skipping"

    {% elif 'beacon' in printer %}
        {% set contact_temp = kat.start_beacon_contact_temp|float %}
        RESPOND PREFIX="HOME" MSG="Beacon detected - preparing contact Z home"
        M109 S{contact_temp}
        G28 Z METHOD=CONTACT CALIBRATE=1

    {% else %}
        RESPOND PREFIX="HOME" MSG="Running normal G28 Z after leveling"
        G28 Z
    {% endif %}

######################################################################
# KAT_BED_MESH
#
# Runs bed mesh calibration if [bed_mesh] is configured.
#
# Behavior:
# - Skips if bed mesh is disabled in KAT
# - Skips if [bed_mesh] is not configured
# - Uses Beacon scan mesh if Beacon is configured
# - Otherwise uses normal adaptive bed mesh
######################################################################
[gcode_macro KAT_BED_MESH]
description: Run adaptive bed mesh if available
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set adaptive_margin = kat.adaptive_margin|float %}

    {% if kat.start_use_bed_mesh|int == 0 %}
        RESPOND PREFIX="MESH" MSG="Bed mesh disabled, skipping"

    {% elif 'bed_mesh' not in printer %}
        RESPOND PREFIX="MESH" MSG="No bed_mesh configured, skipping"

    {% else %}
        BED_MESH_CLEAR

        {% if kat.start_use_adaptive_mesh|int == 1 %}
            {% if 'beacon' in printer %}
                RESPOND PREFIX="MESH" MSG="Running Beacon adaptive scan mesh"
                BED_MESH_CALIBRATE METHOD=scan ADAPTIVE=1 ADAPTIVE_MARGIN={adaptive_margin}
            {% else %}
                RESPOND PREFIX="MESH" MSG="Running adaptive bed mesh"
                BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN={adaptive_margin}
            {% endif %}
        {% else %}
            {% if 'beacon' in printer %}
                RESPOND PREFIX="MESH" MSG="Running Beacon full scan mesh"
                BED_MESH_CALIBRATE METHOD=scan
            {% else %}
                RESPOND PREFIX="MESH" MSG="Running full bed mesh"
                BED_MESH_CALIBRATE
            {% endif %}
        {% endif %}
    {% endif %}

######################################################################
# KAT_PRIME
#
# Runs prime/wipe sequence if configured.
#
# Behavior:
# - Moves to prime position if MOVE_TO_PRIME_POS exists
# - Runs PRIME_LINE if PRIME_LINE exists
# - Skips missing parts with console messages
######################################################################
[gcode_macro KAT_PRIME]
description: Run prime/wipe sequence if available
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    {% if kat.start_use_prime|int == 0 %}
        RESPOND PREFIX="PRIME" MSG="Prime sequence disabled, skipping"

    {% else %}
        {% if 'gcode_macro MOVE_TO_PRIME_POS' in printer %}
            MOVE_TO_PRIME_POS
        {% else %}
            RESPOND PREFIX="PRIME" MSG="MOVE_TO_PRIME_POS not found, skipping move"
        {% endif %}

        {% if 'gcode_macro PRIME_LINE' in printer %}
            PRIME_LINE
        {% else %}
            RESPOND PREFIX="PRIME" MSG="PRIME_LINE not found, skipping prime"
        {% endif %}
    {% endif %}
{% endif %}


######################################################################
# END_PRINT
#
# Generic KAT end print macro.
#
# Main behavior:
# - Turns off heaters
# - Performs a small retract if possible
# - Moves Z to a safe end print height using MOVE_END_PRINT_Z
# - Parks the toolhead using PARK_TOOLHEAD
# - Turns off part cooling, exhaust, and filter helpers if present
# - Restores standby idle timeout
######################################################################
[gcode_macro END_PRINT]
description: Generic KAT END_PRINT
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set current_temp = printer.extruder.temperature|float %}
    {% set can_extrude = printer.extruder.can_extrude %}
    {% set material = kat.current_material|string|upper %}

    ##################################################################
    # End print start
    ##################################################################
    RESPOND PREFIX="PRINT" MSG="END_PRINT begin"
    RESPOND PREFIX="PRINT" MSG="Finishing print for material {material}"

    # Make sure all queued moves are finished before shutdown moves.
    M400

    # Use relative extrusion for the final retract.
    M83

    ##################################################################
    # Final retract
    ##################################################################

    # Retract only if the hotend is allowed to extrude.
    {% if kat.end_print_retract|float > 0 and can_extrude %}
        RESPOND PREFIX="PRINT" MSG="Retracting filament by {kat.end_print_retract}mm"
        G1 E-{kat.end_print_retract|float} F{kat.end_print_retract_feed|float}
    {% else %}
        RESPOND PREFIX="PRINT" MSG="Final retract skipped"
    {% endif %}

    ##################################################################
    # Turn off heaters
    ##################################################################

    # Turn off hotend.
    M104 S0

    # Turn off bed. Smart M140 handles external bed setups.
    M140 S0

    ##################################################################
    # Safe Z move and park
    ##################################################################

    # Move Z to a safe END_PRINT height if the helper exists.
    {% if 'gcode_macro MOVE_END_PRINT_Z' in printer %}
        MOVE_END_PRINT_Z
    {% else %}
        RESPOND PREFIX="Z" MSG="MOVE_END_PRINT_Z not found, skipping safe Z move"
    {% endif %}

    # Park the toolhead if the helper exists.
    {% if 'gcode_macro PARK_TOOLHEAD' in printer %}
        PARK_TOOLHEAD POSITION={kat.end_print_park_position}
    {% else %}
        RESPOND PREFIX="PARK" MSG="PARK_TOOLHEAD not found, skipping park move"
    {% endif %}

    ##################################################################
    # Fans and air handling
    ##################################################################

    # Turn off part cooling fan.
    M107

    # Turn off exhaust fan if helper exists.
    {% if 'gcode_macro EXHAUST_OFF' in printer %}
        EXHAUST_OFF
    {% endif %}

    # Turn off filter fan if helper exists.
    {% if 'gcode_macro FILTER_OFF' in printer %}
        FILTER_OFF
    {% endif %}

    ##################################################################
    # Reset print state
    ##################################################################

    # Restore standby idle timeout.
    SET_IDLE_TIMEOUT TIMEOUT={kat.idle_timeout_standby}

    # Clear pause state.
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=is_paused VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_reason VALUE='"manual"'
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_temp VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_restore_fan VALUE=0.0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_retracted VALUE=0
    SET_GCODE_VARIABLE MACRO=KAT VARIABLE=pause_lift_applied VALUE=0.0

    RESPOND PREFIX="PRINT" MSG="Print complete"
