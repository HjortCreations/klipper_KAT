#####################################################################
# KAT – Prime
#
# Smart park + line/blob priming for Klipper and Kalico.
#
# Design goals:
#   - Prime after the printer has already been heated, homed, leveled
#     and meshed by START_PRINT.
#   - Do not probe for prime.
#   - Use smart park before priming by default.
#   - Avoid unnecessary travel before print start.
#   - Use printer axis limits instead of hardcoded 0,0 assumptions.
#   - Use object data from [exclude_object] when available.
#
# Expected START_PRINT order:
#   1. Heat bed
#   2. Home
#   3. QGL / Z_TILT if available
#   4. Heat hotend
#   5. Z home / Beacon contact if needed
#   6. Bed mesh / adaptive mesh if used
#   7. KAT_PRIME
#   8. Start print
#####################################################################


#####################################################################
# KAT_PRIME
#
# Main user-facing prime macro.
#
# Usage:
#   KAT_PRIME
#   KAT_PRIME TYPE=LINE
#   KAT_PRIME TYPE=BLOB
#
# TYPE overrides variable_prime_type for this call only.
#####################################################################

[gcode_macro KAT_PRIME]
description: Smart park and prime before print start
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    # Prime type can be set globally in KAT or overridden per call.
    {% set prime_type = params.TYPE|default(kat.prime_type)|string|lower %}

    # Smart park is default before prime.
    # The printer should already be homed, leveled, meshed and heated.
    {% if kat.prime_smart_park_enable|int == 1 %}
        KAT_SMART_PARK_PRIME TYPE={prime_type}
    {% endif %}

    {% if prime_type == "blob" %}
        KAT_BLOB_PRIME
    {% elif prime_type == "line" %}
        KAT_LINE_PRIME
    {% else %}
        RESPOND PREFIX="KAT" MSG="Unknown prime type '{prime_type}'. Valid options are LINE or BLOB."
    {% endif %}


#####################################################################
# KAT_SMART_PARK_PRIME
#
# Parks near the expected prime start position.
#
# This is deliberately separate from the actual prime move. It makes
# START_PRINT calmer because the toolhead moves close to where it will
# prime before the final priming action starts.
#####################################################################

[gcode_macro KAT_SMART_PARK_PRIME]
description: Park near the calculated prime position before priming
gcode:
    {% set kat = printer["gcode_macro KAT"] %}
    {% set prime_type = params.TYPE|default(kat.prime_type)|string|lower %}

    # Printer limits from Klipper/Kalico.
    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}

    # Shared KAT park margin.
    {% set margin = kat.park_margin|float %}
    {% set safe_x_min = x_min + margin %}
    {% set safe_x_max = x_max - margin %}
    {% set safe_y_min = y_min + margin %}
    {% set safe_y_max = y_max - margin %}

    # Use the same speed model as the other park logic.
    {% set xy_speed = printer.toolhead.max_velocity|float * 60.0 * kat.park_speed_factor_xy|float %}
    {% set z_speed = printer.toolhead.max_z_velocity|float * 60.0 * kat.park_speed_factor_z|float %}

    {% set park_z = kat.prime_park_z|float %}

    #################################################################
    # Blob prime park position
    #################################################################

    {% if prime_type == "blob" %}

        {% set requested_x = kat.blob_prime_x|float %}
        {% set requested_y = kat.blob_prime_y|float %}

        {% set park_x = [[requested_x, safe_x_min]|max, safe_x_max]|min %}
        {% set park_y = [[requested_y, safe_y_min]|max, safe_y_max]|min %}

    #################################################################
    # Line prime park position
    #################################################################

    {% else %}

        {% set purge_margin = kat.prime_margin|float %}
        {% set purge_length = kat.line_prime_length|float %}
        {% set requested_location = kat.prime_location|string|lower %}

        # Get object points if exclude_object data exists.
        {% if printer.exclude_object is defined and printer.exclude_object.objects|length > 0 %}
            {% set all_points = printer.exclude_object.objects|map(attribute='polygon')|sum(start=[]) %}
        {% else %}
            {% set all_points = [] %}
        {% endif %}

        # Use object bounds when available. Otherwise fall back to a safe
        # machine-minimum area.
        {% if all_points|length > 0 %}
            {% set obj_x_min = all_points|map(attribute=0)|min %}
            {% set obj_x_max = all_points|map(attribute=0)|max %}
            {% set obj_y_min = all_points|map(attribute=1)|min %}
            {% set obj_y_max = all_points|map(attribute=1)|max %}
        {% else %}
            {% set obj_x_min = safe_x_min + purge_margin %}
            {% set obj_x_max = safe_x_min + purge_margin + purge_length %}
            {% set obj_y_min = safe_y_min + purge_margin %}
            {% set obj_y_max = safe_y_min + purge_margin + purge_length %}
        {% endif %}

        {% set x_center_start = ((obj_x_min + obj_x_max) / 2.0) - (purge_length / 2.0) %}
        {% set y_center_start = ((obj_y_min + obj_y_max) / 2.0) - (purge_length / 2.0) %}

        {% set x_start_centered = [[x_center_start, safe_x_min]|max, safe_x_max - purge_length]|min %}
        {% set y_start_centered = [[y_center_start, safe_y_min]|max, safe_y_max - purge_length]|min %}

        {% set y_min_origin = obj_y_min - purge_margin %}
        {% set y_max_origin = obj_y_max + purge_margin %}
        {% set x_min_origin = obj_x_min - purge_margin %}
        {% set x_max_origin = obj_x_max + purge_margin %}

        {% set can_y_min = y_min_origin >= safe_y_min %}
        {% set can_y_max = y_max_origin <= safe_y_max %}
        {% set can_x_min = x_min_origin >= safe_x_min %}
        {% set can_x_max = x_max_origin <= safe_x_max %}

        # Coordinate-based naming avoids ambiguity on printers where
        # physical front/rear does not match coordinate min/max.
        {% if requested_location == "near_y_min" and can_y_min %}
            {% set park_x = x_start_centered %}
            {% set park_y = y_min_origin %}
        {% elif requested_location == "near_y_max" and can_y_max %}
            {% set park_x = x_start_centered %}
            {% set park_y = y_max_origin %}
        {% elif requested_location == "near_x_min" and can_x_min %}
            {% set park_x = x_min_origin %}
            {% set park_y = y_start_centered %}
        {% elif requested_location == "near_x_max" and can_x_max %}
            {% set park_x = x_max_origin %}
            {% set park_y = y_start_centered %}
        {% elif can_y_min %}
            {% set park_x = x_start_centered %}
            {% set park_y = y_min_origin %}
        {% elif can_x_min %}
            {% set park_x = x_min_origin %}
            {% set park_y = y_start_centered %}
        {% elif can_y_max %}
            {% set park_x = x_start_centered %}
            {% set park_y = y_max_origin %}
        {% elif can_x_max %}
            {% set park_x = x_max_origin %}
            {% set park_y = y_start_centered %}
        {% else %}
            {% set park_x = safe_x_min %}
            {% set park_y = safe_y_min %}
        {% endif %}

    {% endif %}

    {% if kat.prime_verbose|int == 1 %}
        RESPOND PREFIX="KAT" MSG="Smart park before prime: X{park_x|round(3)} Y{park_y|round(3)} Z{park_z|round(3)}"
    {% endif %}

    SAVE_GCODE_STATE NAME=KAT_SMART_PARK_PRIME_STATE

    G90
    G0 Z{park_z} F{z_speed}
    G0 X{park_x} Y{park_y} F{xy_speed}

    RESTORE_GCODE_STATE NAME=KAT_SMART_PARK_PRIME_STATE


#####################################################################
# KAT_LINE_PRIME
#
# Draws an adaptive purge line near the printed object.
#
# Placement uses [exclude_object] object polygons when available.
# If no object data exists, it falls back to a safe axis-minimum area.
#####################################################################

[gcode_macro KAT_LINE_PRIME]
description: Prime nozzle with an adaptive purge line
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    {% set purge_margin = kat.prime_margin|float %}
    {% set purge_length = kat.line_prime_length|float %}
    {% set purge_amount = kat.line_prime_amount|float %}
    {% set purge_height = kat.line_prime_height|float %}
    {% set tip_distance = kat.prime_tip_distance|float %}
    {% set wipe_move = kat.prime_wipe_move|float %}
    {% set requested_location = kat.prime_location|string|lower %}

    {% set xy_speed = printer.toolhead.max_velocity|float * 60.0 * kat.park_speed_factor_xy|float %}
    {% set z_speed = printer.toolhead.max_z_velocity|float * 60.0 * kat.park_speed_factor_z|float %}

    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}

    {% set margin = kat.park_margin|float %}
    {% set safe_x_min = x_min + margin %}
    {% set safe_x_max = x_max - margin %}
    {% set safe_y_min = y_min + margin %}
    {% set safe_y_max = y_max - margin %}

    # Use firmware retraction if available.
    {% if printer.firmware_retraction is defined %}
        {% set retract_cmd = "G10" %}
    {% else %}
        {% set retract_cmd = "G1 E-" ~ kat.prime_retract_length|float ~ " F" ~ kat.prime_retract_speed|float %}
    {% endif %}

    # Get object points if exclude_object data exists.
    {% if printer.exclude_object is defined and printer.exclude_object.objects|length > 0 %}
        {% set all_points = printer.exclude_object.objects|map(attribute='polygon')|sum(start=[]) %}
    {% else %}
        {% set all_points = [] %}
    {% endif %}

    # Use object bounds when available. Otherwise fall back to a safe
    # machine-minimum area.
    {% if all_points|length > 0 %}
        {% set obj_x_min = all_points|map(attribute=0)|min %}
        {% set obj_x_max = all_points|map(attribute=0)|max %}
        {% set obj_y_min = all_points|map(attribute=1)|min %}
        {% set obj_y_max = all_points|map(attribute=1)|max %}
        {% set object_data = 1 %}
    {% else %}
        {% set obj_x_min = safe_x_min + purge_margin %}
        {% set obj_x_max = safe_x_min + purge_margin + purge_length %}
        {% set obj_y_min = safe_y_min + purge_margin %}
        {% set obj_y_max = safe_y_min + purge_margin + purge_length %}
        {% set object_data = 0 %}
    {% endif %}

    {% set x_center_start = ((obj_x_min + obj_x_max) / 2.0) - (purge_length / 2.0) %}
    {% set y_center_start = ((obj_y_min + obj_y_max) / 2.0) - (purge_length / 2.0) %}

    {% set x_start_centered = [[x_center_start, safe_x_min]|max, safe_x_max - purge_length]|min %}
    {% set y_start_centered = [[y_center_start, safe_y_min]|max, safe_y_max - purge_length]|min %}

    {% set y_min_origin = obj_y_min - purge_margin %}
    {% set y_max_origin = obj_y_max + purge_margin %}
    {% set x_min_origin = obj_x_min - purge_margin %}
    {% set x_max_origin = obj_x_max + purge_margin %}

    {% set can_y_min = y_min_origin >= safe_y_min %}
    {% set can_y_max = y_max_origin <= safe_y_max %}
    {% set can_x_min = x_min_origin >= safe_x_min %}
    {% set can_x_max = x_max_origin <= safe_x_max %}

    # Select prime location and axis.
    {% if requested_location == "near_y_min" and can_y_min %}
        {% set start_x = x_start_centered %}
        {% set start_y = y_min_origin %}
        {% set axis = "x" %}
        {% set selected = "near_y_min" %}
    {% elif requested_location == "near_y_max" and can_y_max %}
        {% set start_x = x_start_centered %}
        {% set start_y = y_max_origin %}
        {% set axis = "x" %}
        {% set selected = "near_y_max" %}
    {% elif requested_location == "near_x_min" and can_x_min %}
        {% set start_x = x_min_origin %}
        {% set start_y = y_start_centered %}
        {% set axis = "y" %}
        {% set selected = "near_x_min" %}
    {% elif requested_location == "near_x_max" and can_x_max %}
        {% set start_x = x_max_origin %}
        {% set start_y = y_start_centered %}
        {% set axis = "y" %}
        {% set selected = "near_x_max" %}
    {% elif can_y_min %}
        {% set start_x = x_start_centered %}
        {% set start_y = y_min_origin %}
        {% set axis = "x" %}
        {% set selected = "near_y_min" %}
    {% elif can_x_min %}
        {% set start_x = x_min_origin %}
        {% set start_y = y_start_centered %}
        {% set axis = "y" %}
        {% set selected = "near_x_min" %}
    {% elif can_y_max %}
        {% set start_x = x_start_centered %}
        {% set start_y = y_max_origin %}
        {% set axis = "x" %}
        {% set selected = "near_y_max" %}
    {% elif can_x_max %}
        {% set start_x = x_max_origin %}
        {% set start_y = y_start_centered %}
        {% set axis = "y" %}
        {% set selected = "near_x_max" %}
    {% else %}
        {% set start_x = safe_x_min %}
        {% set start_y = safe_y_min %}
        {% set axis = "x" %}
        {% set selected = "fallback_axis_min" %}
    {% endif %}

    # Practical safety inherited from KAMP style purge logic.
    {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section|default(0.64)|float %}

    {% if cross_section < 5 %}
        RESPOND PREFIX="KAT" MSG="Line prime skipped: max_extrude_cross_section is below 5. Set max_extrude_cross_section: 5 or higher."
    {% else %}

        {% if kat.prime_verbose|int == 1 %}
            RESPOND PREFIX="KAT" MSG="Line prime: object_data={object_data}, location={selected}, start=X{start_x|round(3)} Y{start_y|round(3)}, axis={axis}"
        {% endif %}

        SAVE_GCODE_STATE NAME=KAT_LINE_PRIME_STATE

        G90
        M83
        G92 E0

        G0 X{start_x} Y{start_y} F{xy_speed}
        G0 Z{purge_height} F{z_speed}

        {% if tip_distance > 0 %}
            G1 E{tip_distance} F{kat.line_prime_feedrate|float}
        {% endif %}

        {% if axis == "x" %}
            G1 X{start_x + purge_length} E{purge_amount} F{kat.line_prime_feedrate|float}
            {retract_cmd}
            G0 X{[start_x + purge_length + wipe_move, safe_x_max]|min} F{xy_speed}
        {% else %}
            G1 Y{start_y + purge_length} E{purge_amount} F{kat.line_prime_feedrate|float}
            {retract_cmd}
            G0 Y{[start_y + purge_length + wipe_move, safe_y_max]|min} F{xy_speed}
        {% endif %}

        G92 E0
        G0 Z{purge_height * 2.0} F{z_speed}

        RESTORE_GCODE_STATE NAME=KAT_LINE_PRIME_STATE

    {% endif %}


#####################################################################
# KAT_BLOB_PRIME
#
# Blob prime inspired by RatOS/KAMP style:
#   1. Move close to blob position
#   2. Create a slow purge blob
#   3. Lift while extruding
#   4. Wipe away from blob
#   5. Break away from the wipe
#
# No probing is performed.
#####################################################################

[gcode_macro KAT_BLOB_PRIME]
description: Prime nozzle with a blob and wipe
gcode:
    {% set kat = printer["gcode_macro KAT"] %}

    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}

    {% set margin = kat.park_margin|float %}
    {% set safe_x_min = x_min + margin %}
    {% set safe_x_max = x_max - margin %}
    {% set safe_y_min = y_min + margin %}
    {% set safe_y_max = y_max - margin %}

    {% set start_x = [[kat.blob_prime_x|float, safe_x_min]|max, safe_x_max]|min %}
    {% set start_y = [[kat.blob_prime_y|float, safe_y_min]|max, safe_y_max]|min %}

    {% set direction = kat.blob_prime_direction|string|lower %}

    {% if direction == "y-" %}
        {% set dx = 0 %}
        {% set dy = -1 %}
    {% elif direction == "x+" %}
        {% set dx = 1 %}
        {% set dy = 0 %}
    {% elif direction == "x-" %}
        {% set dx = -1 %}
        {% set dy = 0 %}
    {% else %}
        {% set dx = 0 %}
        {% set dy = 1 %}
    {% endif %}

    {% set xy_speed = printer.toolhead.max_velocity|float * 60.0 * kat.park_speed_factor_xy|float %}
    {% set z_speed = printer.toolhead.max_z_velocity|float * 60.0 * kat.park_speed_factor_z|float %}

    {% set pre_x = [[start_x + (dx * 15.0), safe_x_min]|max, safe_x_max]|min %}
    {% set pre_y = [[start_y + (dy * 15.0), safe_y_min]|max, safe_y_max]|min %}

    {% set wipe_x = [[start_x + (dx * kat.blob_prime_wipe_length|float), safe_x_min]|max, safe_x_max]|min %}
    {% set wipe_y = [[start_y + (dy * kat.blob_prime_wipe_length|float), safe_y_min]|max, safe_y_max]|min %}

    {% set break_x = [[start_x + (dx * kat.blob_prime_breakaway_length|float), safe_x_min]|max, safe_x_max]|min %}
    {% set break_y = [[start_y + (dy * kat.blob_prime_breakaway_length|float), safe_y_min]|max, safe_y_max]|min %}

    {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section|default(0.64)|float %}

    {% if cross_section < 5 %}
        RESPOND PREFIX="KAT" MSG="Blob prime skipped: max_extrude_cross_section is below 5. Set max_extrude_cross_section: 5 or higher."
    {% else %}

        {% if kat.prime_verbose|int == 1 %}
            RESPOND PREFIX="KAT" MSG="Blob prime: start=X{start_x|round(3)} Y{start_y|round(3)}, direction={direction}"
        {% endif %}

        SAVE_GCODE_STATE NAME=KAT_BLOB_PRIME_STATE

        G90
        M83
        G92 E0

        # Smart park should already be close to start_x/start_y.
        G0 Z{kat.prime_park_z|float} F{z_speed}
        G0 X{pre_x} Y{pre_y} F{xy_speed}

        # Move into final blob position.
        G1 Z{kat.blob_prime_start_height|float} F{z_speed}
        G1 X{start_x} Y{start_y} F{xy_speed}

        # Create blob slowly.
        G1 E{kat.blob_prime_amount|float} F{kat.blob_prime_blob_feedrate|float}

        # Briefly cool the blob so it stays together during wipe.
        M106 S{kat.blob_prime_fan_speed|int}

        # Lift while extruding to pull away from the blob.
        G1 Z{kat.blob_prime_lift_height|float} E{kat.blob_prime_lift_amount|float} F{kat.blob_prime_lift_feedrate|float}

        # Wipe away from the blob.
        G1 X{wipe_x} Y{wipe_y} E{kat.blob_prime_wipe_amount|float} F{kat.blob_prime_wipe_feedrate|float}

        # Step back down during the wipe. This avoids one large Z drop.
        G1 X{[[start_x + (dx * kat.blob_prime_wipe_length|float * 0.60), safe_x_min]|max, safe_x_max]|min} Y{[[start_y + (dy * kat.blob_prime_wipe_length|float * 0.60), safe_y_min]|max, safe_y_max]|min} Z3.8 E0.5 F{kat.blob_prime_wipe_feedrate|float}
        G1 X{[[start_x + (dx * kat.blob_prime_wipe_length|float * 0.70), safe_x_min]|max, safe_x_max]|min} Y{[[start_y + (dy * kat.blob_prime_wipe_length|float * 0.70), safe_y_min]|max, safe_y_max]|min} Z2.6 E0.5 F{kat.blob_prime_wipe_feedrate|float}
        G1 X{[[start_x + (dx * kat.blob_prime_wipe_length|float * 0.80), safe_x_min]|max, safe_x_max]|min} Y{[[start_y + (dy * kat.blob_prime_wipe_length|float * 0.80), safe_y_min]|max, safe_y_max]|min} Z1.4 E0.5 F{kat.blob_prime_wipe_feedrate|float}
        G1 X{wipe_x} Y{wipe_y} Z0.2 E0.5 F{kat.blob_prime_wipe_feedrate|float}

        # Turn part cooling back off before the print starts.
        M106 S0

        # Small final wipe and breakaway move.
        G1 X{wipe_x} Y{wipe_y} Z0.2 E0.6 F{kat.blob_prime_wipe_feedrate|float}
        G1 X{break_x} Y{break_y} F{xy_speed}

        G92 E0

        RESTORE_GCODE_STATE NAME=KAT_BLOB_PRIME_STATE

    {% endif %}
